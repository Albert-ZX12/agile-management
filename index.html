<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; }
html { font-size: 15px; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1f2937;
  margin: 0;
  min-height: 100vh;
  line-height: 1.6;
}

/* ===== ANTD TOKEN OVERRIDES ===== */
:root {
  --ant-primary: #1677ff;
  --ant-primary-hover: #4096ff;
  --ant-primary-active: #0958d9;
  --ant-bg: #ffffff;
  --ant-bg-container: #f0f2f5;
  --ant-border: #d9d9d9;
  --ant-text: #1f2937;
  --ant-text-secondary: #6b7280;
  --ant-text-tertiary: #9ca3af;
  --ant-radius: 8px;
  --ant-radius-lg: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04);
}

/* ===== LOADING ===== */
#loading-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #001529 0%, #003a8c 50%, #0050b3 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity .4s ease;
}
#loading-screen.hide { opacity: 0; pointer-events: none; }
.loading-logo { font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -1px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.loading-logo-icon { width: 48px; height: 48px; background: rgba(255,255,255,.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.loading-sub { color: rgba(255,255,255,.6); font-size: 14px; margin-bottom: 40px; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== AUTH ===== */
#auth-screen {
  display: none; min-height: 100vh;
  background: linear-gradient(135deg, #001529 0%, #003a8c 60%, #1677ff 100%);
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
#auth-screen::before {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
#auth-screen.show { display: flex; }
.auth-card {
  background: rgba(255,255,255,.98); backdrop-filter: blur(20px);
  border-radius: 20px; padding: 48px 44px; width: 420px;
  box-shadow: 0 25px 50px rgba(0,0,0,.25), 0 0 0 1px rgba(255,255,255,.1);
  position: relative; z-index: 1;
}
.auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.auth-brand-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#1677ff,#003a8c); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; }
.auth-brand-name { font-size: 22px; font-weight: 800; color: #001529; letter-spacing: -.5px; }
.auth-sub { color: #6b7280; font-size: 13px; margin-bottom: 32px; }
.auth-tabs { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 9px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 500; background: #f9fafb; color: #6b7280; border: none; transition: all .2s; }
.auth-tab.active { background: #1677ff; color: #fff; font-weight: 600; }

/* Form fields */
.field { margin-bottom: 16px; }
.field-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
.field-input {
  width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px;
  font-size: 14px; outline: none; background: #fff; color: #1f2937; font-family: inherit;
  transition: all .2s;
}
.field-input:focus { border-color: #1677ff; box-shadow: 0 0 0 3px rgba(22,119,255,.1); }
.field-input.error { border-color: #ef4444; }
.field-err { color: #ef4444; font-size: 12px; margin-top: 4px; min-height: 18px; }
.btn-auth {
  width: 100%; padding: 11px; background: linear-gradient(135deg,#1677ff,#003a8c);
  color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 8px; transition: all .2s; letter-spacing: .3px;
}
.btn-auth:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(22,119,255,.4); }
.btn-auth:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== APP LAYOUT ===== */
#app { display: none; min-height: 100vh; flex-direction: column; }
#app.show { display: flex; }

/* HEADER */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(90deg, #001529 0%, #002766 100%);
  height: 56px; display: flex; align-items: center;
  padding: 0 20px; gap: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  flex-shrink: 0; width: 100%;
}
.header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; margin-right: 8px; }
.header-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#1677ff,#40a9ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.header-logo-text { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.3px; white-space: nowrap; }
.header-nav { display: flex; align-items: center; flex: 1; padding: 0 4px; gap: 2px; overflow-x: auto; scrollbar-width: none; min-width: 0; }
.header-nav::-webkit-scrollbar { display: none; }
.nav-link {
  display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,.75); cursor: pointer;
  border: none; background: transparent; white-space: nowrap; transition: all .2s; flex-shrink: 0;
}
.nav-link:hover { color: #fff; background: rgba(255,255,255,.1); }
.nav-link.active { color: #fff; background: rgba(22,119,255,.55); }
.nav-link .nav-icon { font-size: 14px; }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 8px; }
.user-info {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  padding: 5px 11px; border-radius: 8px; border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.08); color: #fff; transition: all .2s; white-space: nowrap;
}
.user-info:hover { background: rgba(255,255,255,.15); }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg,#1677ff,#40a9ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 500; }
.logout-text { font-size: 11px; color: rgba(255,255,255,.5); }

/* ===== CONTENT ===== */
.app-body { flex: 1; overflow-y: auto; }
.page-content { padding: 24px 24px 40px; width: 100%; max-width: 100%; box-sizing: border-box; }

/* ===== VIEWS ===== */
.view { display: none; }
.view.active { display: block; }

/* ===== PAGE HEADER ===== */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
}
.page-header-left { display: flex; flex-direction: column; gap: 3px; }
.page-title { font-size: 22px; font-weight: 700; color: #111827; letter-spacing: -.4px; line-height: 1.3; }
.page-subtitle { font-size: 13px; color: #6b7280; }
.page-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

/* ===== ANTD-STYLE BUTTONS ===== */
.ant-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 18px; height: 36px; border-radius: 8px;
  font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent;
  transition: all .2s; white-space: nowrap; font-family: inherit;
}
.ant-btn:disabled { opacity: .45; cursor: not-allowed; }
.ant-btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
.ant-btn-primary:hover:not(:disabled) { background: #4096ff; border-color: #4096ff; box-shadow: 0 2px 8px rgba(22,119,255,.35); }
.ant-btn-default { background: #fff; color: #374151; border-color: #d1d5db; }
.ant-btn-default:hover:not(:disabled) { border-color: #1677ff; color: #1677ff; }
.ant-btn-danger { background: #ef4444; color: #fff; border-color: #ef4444; }
.ant-btn-danger:hover:not(:disabled) { background: #dc2626; border-color: #dc2626; }
.ant-btn-ghost { background: transparent; color: #6b7280; border-color: #d1d5db; }
.ant-btn-ghost:hover:not(:disabled) { border-color: #1677ff; color: #1677ff; background: #eff6ff; }
.ant-btn-sm { height: 30px; padding: 0 12px; font-size: 13px; border-radius: 6px; }
.ant-btn-xs { height: 24px; padding: 0 8px; font-size: 12px; border-radius: 5px; }
.ant-btn-link { border: none; background: transparent; color: #1677ff; padding: 0 4px; }
.ant-btn-link:hover { color: #4096ff; }
.ant-btn-icon { padding: 0; width: 36px; height: 36px; justify-content: center; }
.ant-btn-icon.ant-btn-sm { width: 30px; height: 30px; }

/* ===== ANTD-STYLE CARDS ===== */
.ant-card {
  background: #fff; border-radius: 12px; border: 1px solid #f0f0f0;
  box-shadow: var(--shadow-sm); overflow: hidden;
}
.ant-card-head {
  padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
  display: flex; align-items: center; justify-content: space-between;
}
.ant-card-head-title { font-size: 15px; font-weight: 600; color: #111827; display: flex; align-items: center; gap: 8px; }
.ant-card-body { padding: 20px; }
.ant-card-sm .ant-card-body { padding: 14px 16px; }
.ant-card-hoverable { cursor: pointer; transition: all .2s; }
.ant-card-hoverable:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: #bfdbfe; }

/* ===== ANTD-STYLE FORM ===== */
.ant-form-item { margin-bottom: 18px; }
.ant-form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
.ant-input, .ant-select, .ant-textarea {
  width: 100%; padding: 9px 13px; border: 1.5px solid #e5e7eb; border-radius: 8px;
  font-size: 14px; outline: none; background: #fff; color: #1f2937; font-family: inherit;
  transition: all .2s;
}
.ant-input:focus, .ant-select:focus, .ant-textarea:focus {
  border-color: #1677ff; box-shadow: 0 0 0 3px rgba(22,119,255,.1);
}
.ant-textarea { resize: vertical; min-height: 80px; }
.ant-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.ant-form-row > * { min-width: 0; }
.ant-form-row-3 { grid-template-columns: 1fr 1fr 1fr; }

/* ===== ANTD-STYLE TAGS/BADGES ===== */
.ant-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid transparent; white-space: nowrap;
}
.ant-tag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
/* Status tags */
.tag-draft { background: #f1f5f9; color: #64748b; border-color: #cbd5e1; }
.tag-prd { background: #faf5ff; color: #7c3aed; border-color: #ddd6fe; }
.tag-dev { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.tag-test { background: #ecfeff; color: #0e7490; border-color: #a5f3fc; }
.tag-online { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
.tag-archived { background: #f8fafc; color: #94a3b8; border-color: #e2e8f0; }
.tag-blocked { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
/* Priority tags */
.tag-urgent { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
.tag-high { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
.tag-medium { background: #fefce8; color: #a16207; border-color: #fef08a; }
.tag-low { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }
/* Type tags */
.tag-feature { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.tag-bug { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
.tag-improve { background: #faf5ff; color: #7c3aed; border-color: #ddd6fe; }
.tag-tech { background: #ecfeff; color: #0e7490; border-color: #a5f3fc; }
/* Task type */
.tag-tt-dev { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.tag-tt-test { background: #ecfeff; color: #0e7490; border-color: #a5f3fc; }
.tag-tt-design { background: #faf5ff; color: #7c3aed; border-color: #ddd6fe; }
.tag-tt-other { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }
/* Alert badges */
.tag-overdue { background: #fef2f2; color: #b91c1c; border-color: #fecaca; animation: pulse-red 2s infinite; }
.tag-soon { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
@keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(185,28,28,.2)} 50%{box-shadow:0 0 0 4px rgba(185,28,28,.0)} }

/* ===== ANTD-STYLE TABLE ===== */
.ant-table-wrap { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; overflow: hidden; box-shadow: var(--shadow-sm); }
.ant-table { width: 100%; border-collapse: collapse; }
.ant-table thead th {
  padding: 13px 16px; font-size: 13px; font-weight: 600; text-align: left;
  background: #fafafa; color: #6b7280; border-bottom: 1px solid #f0f0f0;
  white-space: nowrap; letter-spacing: .2px;
}
.ant-table tbody td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid #fafafa; color: #374151; vertical-align: middle; }
.ant-table tbody tr:last-child td { border-bottom: none; }
.ant-table tbody tr:hover td { background: #f0f7ff; }

/* ===== ANTD-STYLE STATS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: #fff; border-radius: 12px; border: 1px solid #f0f0f0;
  padding: 20px 24px; box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 16px; transition: all .2s;
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stat-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.stat-icon-blue { background: #eff6ff; }
.stat-icon-green { background: #f0fdf4; }
.stat-icon-orange { background: #fff7ed; }
.stat-icon-red { background: #fef2f2; }
.stat-icon-purple { background: #faf5ff; }
.stat-info { flex: 1; }
.stat-num { font-size: 30px; font-weight: 800; line-height: 1.1; letter-spacing: -1px; }
.stat-num-blue { color: #1677ff; }
.stat-num-green { color: #16a34a; }
.stat-num-orange { color: #ea580c; }
.stat-num-red { color: #dc2626; }
.stat-num-purple { color: #7c3aed; }
.stat-label { font-size: 13px; color: #9ca3af; font-weight: 500; margin-top: 3px; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 16px 20px; background: #fff; border-radius: 12px;
  border: 1px solid #f0f0f0; margin-bottom: 16px; box-shadow: var(--shadow-sm);
}
.filter-select, .filter-input {
  padding: 8px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
  font-size: 13px; background: #fff; outline: none; color: #1f2937; font-family: inherit;
  transition: border-color .2s; height: 36px;
}
.filter-select:focus, .filter-input:focus { border-color: #1677ff; }
.filter-input { min-width: 220px; }
.filter-spacer { flex: 1; }

/* ===== REQ LIST CARDS ===== */
.req-list { display: flex; flex-direction: column; gap: 10px; }
.req-card {
  background: #fff; border-radius: 12px; border: 1px solid #f0f0f0;
  padding: 18px 22px; cursor: pointer; transition: all .2s;
  box-shadow: var(--shadow-sm); display: flex; gap: 16px; align-items: flex-start;
}
.req-card:hover { box-shadow: var(--shadow-md); border-color: #bfdbfe; transform: translateY(-1px); }
.req-card-left { flex: 1; min-width: 0; }
.req-card-title { font-size: 15px; font-weight: 600; color: #111827; margin-bottom: 8px; line-height: 1.4; }
.req-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.req-card-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; font-size: 13px; color: #9ca3af; }
.req-card-meta-item { display: flex; align-items: center; gap: 4px; }
.req-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.req-progress-wrap { width: 120px; }
.req-progress-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
.req-progress-fill { height: 100%; background: linear-gradient(90deg,#1677ff,#40a9ff); border-radius: 3px; transition: width .3s; }
.req-progress-text { font-size: 11px; color: #9ca3af; text-align: right; }

/* ===== KANBAN ===== */
.kanban-board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 16px; align-items: flex-start; min-height: 70vh; }
.kanban-board::-webkit-scrollbar { height: 6px; }
.kanban-board::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
.kanban-col {
  flex-shrink: 0; width: 280px; background: #f8fafc;
  border-radius: 12px; border: 1px solid #e5e7eb;
  display: flex; flex-direction: column; max-height: calc(100vh - 200px);
}
.kanban-col-hd {
  padding: 14px 16px 12px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #e5e7eb; flex-shrink: 0; border-radius: 12px 12px 0 0;
}
.kanban-col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.kanban-col-name { font-size: 14px; font-weight: 700; color: #374151; flex: 1; }
.kanban-col-cnt { background: #e5e7eb; color: #6b7280; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.kanban-col-body { padding: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.kanban-col-body::-webkit-scrollbar { width: 4px; }
.kanban-col-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
.kanban-card {
  background: #fff; border-radius: 10px; border: 1.5px solid #f0f0f0;
  padding: 13px 14px; cursor: pointer; transition: all .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.kanban-card:hover { border-color: #93c5fd; box-shadow: 0 4px 12px rgba(22,119,255,.12); transform: translateY(-2px); }
.kanban-card.overdue { border-left: 3px solid #ef4444; }
.kanban-card.due-soon { border-left: 3px solid #f97316; }
.kanban-card-title { font-size: 13px; font-weight: 600; color: #1f2937; line-height: 1.45; margin-bottom: 8px; }
.kanban-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.kanban-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.kanban-card-owner { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #9ca3af; }
.kanban-owner-av { width: 20px; height: 20px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.kanban-date { font-size: 11px; font-weight: 500; }
.kanban-date.ok { color: #16a34a; }
.kanban-date.soon { color: #f97316; }
.kanban-date.over { color: #ef4444; }
.kanban-empty { padding: 20px; text-align: center; font-size: 13px; color: #9ca3af; }
.kanban-progress-wrap { margin-bottom: 8px; }
.kanban-progress { height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
.kanban-progress-fill { height: 100%; background: linear-gradient(90deg,#1677ff,#40a9ff); border-radius: 2px; }

/* ===== CALENDAR ===== */
.cal-header-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.cal-nav-btn { width: 34px; height: 34px; border: 1.5px solid #e5e7eb; border-radius: 8px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #6b7280; transition: all .2s; }
.cal-nav-btn:hover { border-color: #1677ff; color: #1677ff; }
.cal-month { font-size: 18px; font-weight: 700; color: #111827; min-width: 140px; text-align: center; }
.cal-grid-wrap { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; overflow: hidden; box-shadow: var(--shadow-sm); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day-hd { padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: #9ca3af; background: #fafafa; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; }
.cal-day-hd:last-child { border-right: none; }
.cal-day { min-height: 110px; padding: 6px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; vertical-align: top; position: relative; }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.other { background: #fafafa; }
.cal-day.today { background: #eff6ff; }
.cal-day-n { font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.cal-day-n.today-n { color: #1677ff; }
.today-badge { background: #1677ff; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
.cal-bar { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; margin-bottom: 3px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.6; transition: opacity .15s; color: #fff; }
.cal-bar:hover { opacity: .8; filter: brightness(1.1); }
.cal-online-badge { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #16a34a; margin-right: 3px; }
.cal-legend { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
.cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7280; }
.cal-legend-dot { width: 12px; height: 12px; border-radius: 3px; }

/* ===== SIDE PANEL ===== */
.sp-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 500; display: none; justify-content: flex-end; backdrop-filter: blur(2px); }
.sp-overlay.open { display: flex; }
.sp-panel {
  width: min(760px, 95vw); height: 100vh; background: #fff;
  display: flex; flex-direction: column;
  box-shadow: -8px 0 32px rgba(0,0,0,.15);
  animation: sp-in .28s cubic-bezier(.4,0,.2,1);
}
@keyframes sp-in { from{transform:translateX(100%)}to{transform:translateX(0)} }
.sp-header {
  padding: 18px 24px; background: #fff; border-bottom: 1px solid #f0f0f0;
  display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0;
  position: sticky; top: 0; z-index: 10;
}
.sp-close {
  width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid #e5e7eb;
  background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #9ca3af; flex-shrink: 0; transition: all .2s;
}
.sp-close:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }
.sp-title { font-size: 16px; font-weight: 700; color: #111827; flex: 1; line-height: 1.4; }
.sp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.sp-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.sp-body::-webkit-scrollbar { width: 5px; }
.sp-body::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
.sp-section { background: #fff; border-radius: 10px; border: 1px solid #f0f0f0; overflow: hidden; }
.sp-section-hd { padding: 13px 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.sp-section-title { font-size: 13px; font-weight: 700; color: #374151; display: flex; align-items: center; gap: 7px; }
.sp-section-title::before { content: ''; width: 3px; height: 13px; background: #1677ff; border-radius: 2px; display: inline-block; }
.sp-section-body { padding: 14px 16px; }

/* Status flow */
.status-flow { display: flex; align-items: center; overflow-x: auto; padding-bottom: 4px; gap: 0; }
.status-flow::-webkit-scrollbar { height: 3px; }
.sf-step { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.sf-node-wrap { display: flex; align-items: center; }
.sf-line { width: 32px; height: 2px; background: #e5e7eb; flex-shrink: 0; }
.sf-line.done { background: #22c55e; }
.sf-dot {
  width: 30px; height: 30px; border-radius: 50%; border: 2px solid #e5e7eb;
  background: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #9ca3af; cursor: pointer; transition: all .2s;
}
.sf-dot:hover { border-color: #1677ff; color: #1677ff; }
.sf-dot.done { background: #22c55e; border-color: #22c55e; color: #fff; }
.sf-dot.active { background: #1677ff; border-color: #1677ff; color: #fff; box-shadow: 0 0 0 4px rgba(22,119,255,.2); }
.sf-label { font-size: 11px; color: #9ca3af; margin-top: 5px; white-space: nowrap; text-align: center; }
.sf-label.active { color: #1677ff; font-weight: 600; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item { display: flex; flex-direction: column; gap: 3px; }
.info-label { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.info-value { font-size: 14px; color: #374151; font-weight: 500; }

/* Progress bar */
.prog-bar-wrap { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin: 4px 0; }
.prog-bar-fill { height: 100%; background: linear-gradient(90deg,#1677ff,#40a9ff); border-radius: 4px; transition: width .3s; }

/* PRD */
.prd-toolbar { display: flex; gap: 4px; flex-wrap: wrap; padding: 10px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
.prd-tool { padding: 4px 9px; border: 1.5px solid #e5e7eb; border-radius: 6px; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: #6b7280; transition: all .15s; }
.prd-tool:hover { border-color: #1677ff; color: #1677ff; background: #eff6ff; }
.prd-editor { width: 100%; padding: 14px; border: none; font-size: 14px; font-family: inherit; resize: vertical; min-height: 280px; outline: none; color: #1f2937; line-height: 1.75; background: #fff; }
.prd-preview { padding: 14px; font-size: 14px; line-height: 1.75; color: #374151; background: #fafafa; }
.prd-preview h1,.prd-preview h2,.prd-preview h3 { font-weight: 700; color: #1677ff; margin: 14px 0 6px; }
.prd-preview h1 { font-size: 20px; } .prd-preview h2 { font-size: 17px; } .prd-preview h3 { font-size: 15px; }
.prd-preview p { margin-bottom: 8px; }
.prd-preview ul,.prd-preview ol { padding-left: 20px; margin-bottom: 8px; }
.prd-preview li { margin-bottom: 3px; }
.prd-preview strong { font-weight: 700; }
.prd-preview em { font-style: italic; color: #6b7280; }
.prd-preview code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px; color: #0f172a; }
.prd-preview hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
.prd-ver { font-size: 12px; color: #9ca3af; padding: 8px 14px; background: #f8fafc; border-bottom: 1px solid #f0f0f0; }

/* Tasks inline table */
.tasks-tbl { width: 100%; border-collapse: collapse; }
.tasks-tbl th { padding: 9px 12px; font-size: 12px; font-weight: 600; text-align: left; background: #f8fafc; color: #9ca3af; border-bottom: 1px solid #f0f0f0; text-transform: uppercase; letter-spacing: .3px; }
.tasks-tbl td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #fafafa; vertical-align: middle; }
.tasks-tbl tr:last-child td { border-bottom: none; }
.tasks-tbl tr:hover td { background: #f0f7ff; }
.tasks-tbl input[type=number] { width: 70px; padding: 5px 8px; border: 1.5px solid #e5e7eb; border-radius: 6px; font-size: 12px; outline: none; text-align: center; }
.tasks-tbl input[type=number]:focus { border-color: #1677ff; }
.tasks-tbl select { padding: 5px 8px; border: 1.5px solid #e5e7eb; border-radius: 6px; font-size: 12px; outline: none; background: #fff; color: #374151; }
.tasks-tbl select:focus { border-color: #1677ff; }

/* Timelog form */
.tl-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; padding: 12px 14px; background: #f8fafc; border-radius: 8px; margin-bottom: 12px; }
.tl-form-item { display: flex; flex-direction: column; gap: 4px; }
.tl-form-item label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .3px; }
.tl-form-item select,.tl-form-item input { padding: 8px 10px; border: 1.5px solid #e5e7eb; border-radius: 7px; font-size: 13px; outline: none; background: #fff; color: #374151; font-family: inherit; }
.tl-form-item select:focus,.tl-form-item input:focus { border-color: #1677ff; }
.tl-list { display: flex; flex-direction: column; gap: 6px; }
.tl-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: #f8fafc; border: 1px solid #f0f0f0; border-radius: 8px; font-size: 13px; }
.tl-user { font-weight: 600; color: #374151; min-width: 64px; flex-shrink: 0; }
.tl-date { color: #9ca3af; min-width: 76px; flex-shrink: 0; font-size: 12px; }
.tl-task { color: #6b7280; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-hours { font-weight: 800; color: #1677ff; font-size: 14px; min-width: 46px; text-align: right; flex-shrink: 0; }
.tl-del { color: #d1d5db; cursor: pointer; font-size: 16px; padding: 2px; transition: color .15s; }
.tl-del:hover { color: #ef4444; }

/* Progress updates */
.pu-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 14px; }
.pu-list { display: flex; flex-direction: column; gap: 10px; }
.pu-item { background: #f8fafc; border: 1px solid #f0f0f0; border-radius: 10px; padding: 13px 16px; }
.pu-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pu-author { font-size: 13px; font-weight: 700; color: #374151; }
.pu-time { font-size: 12px; color: #9ca3af; }
.pu-pct { margin-left: auto; font-size: 13px; font-weight: 800; color: #1677ff; }
.pu-text { font-size: 13px; color: #6b7280; line-height: 1.55; }

/* Comments */
.comment-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
.comment-item { display: flex; gap: 10px; }
.comment-av { width: 30px; height: 30px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.comment-bubble { flex: 1; background: #f8fafc; border-radius: 0 10px 10px 10px; padding: 10px 13px; border: 1px solid #f0f0f0; }
.comment-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.comment-author { font-size: 13px; font-weight: 700; color: #374151; }
.comment-time { font-size: 11px; color: #9ca3af; }
.comment-del-btn { margin-left: auto; font-size: 11px; color: #9ca3af; cursor: pointer; }
.comment-del-btn:hover { color: #ef4444; }
.comment-text { font-size: 13px; color: #6b7280; line-height: 1.55; word-break: break-word; }
.mention-hl { color: #1677ff; font-weight: 600; background: #eff6ff; padding: 0 3px; border-radius: 3px; }
.comment-input-area { display: flex; gap: 8px; align-items: flex-start; position: relative; }
.comment-ta { flex: 1; padding: 9px 12px; border: 1.5px solid #e5e7eb; border-radius: 9px; font-size: 13px; resize: none; min-height: 38px; max-height: 120px; font-family: inherit; outline: none; background: #fff; transition: border-color .2s; }
.comment-ta:focus { border-color: #1677ff; box-shadow: 0 0 0 3px rgba(22,119,255,.1); }
.comment-send-btn { padding: 0 16px; height: 38px; background: #1677ff; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; }
.comment-send-btn:hover { background: #4096ff; }
.mention-popup { position: absolute; bottom: calc(100% + 6px); left: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: var(--shadow-lg); z-index: 70; min-width: 180px; display: none; overflow: hidden; }
.mention-popup.open { display: block; }
.mention-opt { padding: 9px 14px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 9px; transition: background .1s; }
.mention-opt:hover { background: #f0f7ff; }
.mention-av { width: 24px; height: 24px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

/* Attachments */
.attach-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.attach-chip { display: flex; align-items: center; gap: 7px; padding: 7px 11px; background: #f8fafc; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 12px; color: #6b7280; cursor: pointer; max-width: 200px; transition: all .2s; }
.attach-chip:hover { border-color: #93c5fd; color: #1677ff; background: #eff6ff; }
.attach-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.attach-del { color: #d1d5db; font-size: 14px; flex-shrink: 0; }
.attach-del:hover { color: #ef4444; }
.attach-drop { border: 2px dashed #d1d5db; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: all .2s; font-size: 14px; color: #9ca3af; }
.attach-drop:hover { border-color: #1677ff; color: #1677ff; background: #eff6ff; }

/* Timelog view */
.tl-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 20px; }
.tl-stat-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 10px; padding: 14px 18px; text-align: center; box-shadow: var(--shadow-sm); }
.tl-stat-num { font-size: 24px; font-weight: 800; color: #1677ff; line-height: 1.1; }
.tl-stat-label { font-size: 12px; color: #9ca3af; font-weight: 500; margin-top: 3px; }

/* ===== MODAL ===== */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-mask.open { display: flex; }
.modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 540px; box-shadow: var(--shadow-xl); max-height: 90vh; overflow-y: auto; animation: modal-in .2s cubic-bezier(.4,0,.2,1); }
.modal-box-lg { max-width: 720px; }
@keyframes modal-in { from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)} }
.modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 17px; font-weight: 700; color: #111827; }
.modal-close { width: 30px; height: 30px; border-radius: 7px; border: none; background: #f3f4f6; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #6b7280; transition: all .15s; }
.modal-close:hover { background: #fee2e2; color: #ef4444; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }
.modal-err { color: #ef4444; font-size: 13px; margin-top: 6px; min-height: 18px; }
.divider { height: 1px; background: #f0f0f0; margin: 14px 0; }

/* ===== TOAST ===== */
.toast-container { position: fixed; top: 72px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast-item {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border-radius: 10px; font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); min-width: 200px; max-width: 360px;
  animation: toast-in .3s cubic-bezier(.4,0,.2,1);
  pointer-events: auto;
}
@keyframes toast-in { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)} }
.toast-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.toast-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.toast-info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.toast-icon { font-size: 16px; flex-shrink: 0; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 60px 24px; }
.empty-icon { font-size: 48px; margin-bottom: 14px; }
.empty-title { font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.empty-desc { font-size: 14px; color: #9ca3af; }

/* ===== ROLE BADGES ===== */
.role-badge { font-size: 12px; padding: 3px 9px; border-radius: 6px; font-weight: 600; }
.role-admin { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.role-pm { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.role-dev { background: #faf5ff; color: #7c3aed; border: 1px solid #ddd6fe; }
.role-member { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

/* ===== OVERDUE ===== */
.overdue-alert { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; font-size: 13px; color: #b91c1c; font-weight: 500; margin-top: 10px; }
.soon-alert { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; font-size: 13px; color: #c2410c; font-weight: 500; margin-top: 10px; }

/* ===== RESPONSIVE ===== */
@media (min-width: 1400px) {
  .page-content { padding: 28px 32px 40px; }
  .kanban-col { width: 260px; }
}
@media (min-width: 1800px) {
  .page-content { padding: 32px 40px 40px; }
  .stats-grid { gap: 18px; }
  .kanban-col { width: 300px; }
  .sp-panel { width: min(820px, 95vw); }
}
@media (min-width: 2400px) {
  .page-content { padding: 36px 56px 40px; }
  .kanban-col { width: 340px; }
  .sp-panel { width: min(900px, 95vw); }
  .stat-num { font-size: 34px; }
}

/* ===== MISC ===== */
.text-link { color: #1677ff; cursor: pointer; }
.text-link:hover { color: #4096ff; text-decoration: underline; }
.text-muted { color: #9ca3af; font-size: 13px; }
.fw-bold { font-weight: 700; }
.flex-row { display: flex; align-items: center; gap: 8px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.mb-0 { margin-bottom: 0; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.scroll-x { overflow-x: auto; }
.scroll-x::-webkit-scrollbar { height: 5px; }
.scroll-x::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .page-content { padding: 14px 12px 32px; }
  .ant-form-row { grid-template-columns: 1fr; }
  .ant-form-row-3 { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: stretch; }
  .page-actions { justify-content: flex-end; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .info-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-wrap: wrap; gap: 8px; }
  .filter-input { width: 100%; }
  .modal-box { max-width: 92vw !important; }
  .kanban-board { gap: 10px; }
  .kanban-col { width: 220px; }
  .sp-panel { width: 100vw; }
  .req-card { padding: 14px 16px; }
  .stat-card { padding: 14px 16px; }
  .stat-num { font-size: 24px; }
  .nav-link { padding: 5px 9px; font-size: 12px; }
  .header-logo-text { display: none; }
  .user-name { display: none; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .page-title { font-size: 18px; }
  .sp-panel { width: 100vw; }
}

</style>

<script>
// ============ SUPABASE ============
let sb;
try{ sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){}

// ============ STATE ============
let CU=null,allUsers=[],allRequirements=[],allTasks=[],allTimelogs=[];
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let currentSpReqId=null;

// ============ MAPS ============
const STATUS_MAP={draft:'草稿',prd:'PRD编写',dev:'开发中',test:'测试中',online:'已上线',archived:'已归档',blocked:'受阻'};
const STATUS_CLS={draft:'tag-draft',prd:'tag-prd',dev:'tag-dev',test:'tag-test',online:'tag-online',archived:'tag-archived',blocked:'tag-blocked'};
const STATUS_FLOW=['draft','prd','dev','test','online'];
const STATUS_DOTS={draft:'#94a3b8',prd:'#8b5cf6',dev:'#3b82f6',test:'#06b6d4',online:'#16a34a',blocked:'#ef4444',archived:'#94a3b8'};
const PRIORITY_MAP={urgent:'紧急',high:'高',medium:'中',low:'低'};
const PRIORITY_CLS={urgent:'tag-urgent',high:'tag-high',medium:'tag-medium',low:'tag-low'};
const TYPE_MAP={feature:'新功能',bug:'Bug修复',improve:'优化改进',tech:'技术需求'};
const TYPE_CLS={feature:'tag-feature',bug:'tag-bug',improve:'tag-improve',tech:'tag-tech'};
const TASK_TYPE_MAP={dev:'开发',test:'测试',design:'设计',other:'其他'};
const TASK_TYPE_CLS={dev:'tag-tt-dev',test:'tag-tt-test',design:'tag-tt-design',other:'tag-tt-other'};
const TASK_STATUS_MAP={todo:'待开始',doing:'进行中',done:'已完成'};
const CAL_COLORS={draft:'#f97316',prd:'#8b5cf6',dev:'#3b82f6',test:'#06b6d4',online:'#16a34a',blocked:'#ef4444',archived:'#94a3b8'};

// ============ INIT ============
window.addEventListener('DOMContentLoaded',async()=>{
  if(!sb)return;
  const{data:{session}}=await sb.auth.getSession();
  if(session){await loadProfile(session.user.id);}else{hideLoading();}
});
async function loadProfile(authId){
  const{data}=await sb.from('users').select('*').eq('auth_id',authId).single();
  if(data){CU=data;await enterApp();}else{hideLoading();}
}
function hideLoading(){
  const el=document.getElementById('loading-screen');
  el.classList.add('hide');
  setTimeout(()=>el.style.display='none',400);
  document.getElementById('auth-screen').classList.add('show');
}

// ============ AUTH ============
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
}
async function doLogin(){
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('l-btn');
  if(!u||!p){err.textContent='请填写用户名和密码';return;}
  err.textContent='';btn.disabled=true;btn.textContent='登录中...';
  try{
    const{data:ur}=await sb.from('users').select('email').eq('username',u).single();
    if(!ur){err.textContent='用户名或密码错误';return;}
    const{data,error}=await sb.auth.signInWithPassword({email:ur.email,password:p});
    if(error){err.textContent='用户名或密码错误';return;}
    await loadProfile(data.user.id);
  }catch(e){err.textContent='登录失败，请重试';}
  finally{btn.disabled=false;btn.textContent='登 录';}
}
async function doRegister(){
  const u=document.getElementById('r-user').value.trim(),name=document.getElementById('r-name').value.trim(),p=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err'),btn=document.getElementById('r-btn');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  err.textContent='';btn.disabled=true;btn.textContent='注册中...';
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@agile-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='注册失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role:'member'});
    showToast('注册成功，请登录','success');switchTab('login');
    document.getElementById('l-user').value=u;
  }catch(e){err.textContent='注册出错，请重试';}
  finally{btn.disabled=false;btn.textContent='注 册';}
}
async function doLogout(){
  await sb.auth.signOut();CU=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').classList.add('show');
}
async function enterApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').classList.remove('show');
  const app=document.getElementById('app');app.style.display='flex';
  document.getElementById('top-name').textContent=CU.name;
  document.getElementById('top-avatar').textContent=CU.name.slice(0,1);
  if(CU.role==='admin'||CU.role==='pm') document.getElementById('nav-users').style.display='';
  document.getElementById('tl-filter-month').value=new Date().toISOString().slice(0,7);
  await refreshAll();
  showView('dashboard');
}
async function refreshAll(){
  const[{data:users},{data:reqs},{data:tasks},{data:tlogs}]=await Promise.all([
    sb.from('users').select('*').order('name'),
    sb.from('requirements').select('*').order('created_at',{ascending:false}),
    sb.from('tasks').select('*').order('created_at'),
    sb.from('timelog').select('*').order('log_date',{ascending:false})
  ]);
  allUsers=users||[];allRequirements=reqs||[];allTasks=tasks||[];allTimelogs=tlogs||[];
  const uSel=document.getElementById('tl-filter-user');
  uSel.innerHTML='<option value="">全部成员</option>'+allUsers.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  const rSel=document.getElementById('tl-filter-req');
  rSel.innerHTML='<option value="">全部需求</option>'+allRequirements.map(r=>`<option value="${r.id}">${r.title}</option>`).join('');
}

// ============ NAVIGATION ============
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active'));
  const vEl=document.getElementById('view-'+name);
  if(vEl) vEl.classList.add('active');
  const nav=document.querySelector(`.nav-link[data-view="${name}"]`);
  if(nav) nav.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(name==='dashboard') renderDashboard();
  if(name==='requirements') renderRequirements();
  if(name==='kanban') renderKanban();
  if(name==='calendar') renderCalendar();
  if(name==='my-tasks') renderMyTasks();
  if(name==='timelog') renderTimelog();
  if(name==='users') renderUsers();
}

// ============ HELPERS ============
function userName(id){const u=allUsers.find(x=>x.id===id);return u?u.name:'—';}
function userAvatar(id){const u=allUsers.find(x=>x.id===id);return u?u.name.slice(0,1):'?';}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function statusTag(s){return`<span class="ant-tag ${STATUS_CLS[s]||'tag-draft'}">${STATUS_MAP[s]||s}</span>`;}
function priorityTag(p){return`<span class="ant-tag ${PRIORITY_CLS[p]||'tag-medium'}">${PRIORITY_MAP[p]||p}</span>`;}
function typeTag(t){return`<span class="ant-tag ${TYPE_CLS[t]||'tag-feature'}">${TYPE_MAP[t]||t}</span>`;}
function taskTypeTag(t){return`<span class="ant-tag ${TASK_TYPE_CLS[t]||'tag-tt-dev'}">${TASK_TYPE_MAP[t]||t}</span>`;}
function getDueDays(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function dueBadge(d,status){
  if(!d||status==='online'||status==='archived')return'';
  const dd=getDueDays(d);
  if(dd<0)return`<span class="ant-tag tag-overdue">⚠ 逾期${Math.abs(dd)}天</span>`;
  if(dd<=3)return`<span class="ant-tag tag-soon">⏰ 还剩${dd}天</span>`;
  return'';
}

// ============ DASHBOARD ============
function renderDashboard(){
  const total=allRequirements.length;
  const indev=allRequirements.filter(r=>['dev','test'].includes(r.status)).length;
  const online=allRequirements.filter(r=>r.status==='online').length;
  const blocked=allRequirements.filter(r=>r.status==='blocked').length;
  const totalH=allTimelogs.reduce((s,t)=>s+Number(t.hours),0);
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-icon stat-icon-blue">📋</div><div class="stat-info"><div class="stat-num stat-num-blue">${total}</div><div class="stat-label">全部需求</div></div></div>
    <div class="stat-card"><div class="stat-icon stat-icon-orange">🔥</div><div class="stat-info"><div class="stat-num stat-num-orange">${indev}</div><div class="stat-label">研发中</div></div></div>
    <div class="stat-card"><div class="stat-icon stat-icon-green">✅</div><div class="stat-info"><div class="stat-num stat-num-green">${online}</div><div class="stat-label">已上线</div></div></div>
    <div class="stat-card"><div class="stat-icon stat-icon-red">🚫</div><div class="stat-info"><div class="stat-num stat-num-red">${blocked}</div><div class="stat-label">受阻</div></div></div>
    <div class="stat-card"><div class="stat-icon stat-icon-purple">⏱</div><div class="stat-info"><div class="stat-num stat-num-purple">${totalH.toFixed(1)}</div><div class="stat-label">总工时(h)</div></div></div>`;
  const ip=allRequirements.filter(r=>['dev','test','prd'].includes(r.status)).slice(0,6);
  const ipEl=document.getElementById('dash-inprogress');
  if(!ip.length){ipEl.innerHTML=`<div class="empty-state" style="padding:24px"><div class="empty-icon">✨</div><div class="empty-title">暂无进行中需求</div></div>`;return;}

// ============ CALENDAR ============
function changeCalMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar(){
  document.getElementById('cal-month-label').textContent=`${calYear}年${calMonth+1}月`;
  const grid=document.getElementById('cal-grid');
  const dayNames=['日','一','二','三','四','五','六'];
  let html=dayNames.map(d=>`<div class="cal-day-hd">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const reqSpans=allRequirements.filter(r=>r.status!=='archived').map(r=>{
    const start=new Date(r.created_at);start.setHours(0,0,0,0);
    const end=r.target_date?new Date(r.target_date):new Date(r.created_at);end.setHours(0,0,0,0);
    return{r,start,end,onlineDate:r.online_date?new Date(r.online_date):null};
  });
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    let dayNum,isOther=false,dateObj;
    if(i<firstDay){dayNum=daysInPrev-firstDay+i+1;isOther=true;dateObj=new Date(calYear,calMonth-1,dayNum);}
    else if(i>=firstDay+daysInMonth){dayNum=i-firstDay-daysInMonth+1;isOther=true;dateObj=new Date(calYear,calMonth+1,dayNum);}
    else{dayNum=i-firstDay+1;dateObj=new Date(calYear,calMonth,dayNum);}
    dateObj.setHours(0,0,0,0);
    const isToday=dateObj.getTime()===today.getTime();
    const activeReqs=reqSpans.filter(({start,end})=>dateObj>=start&&dateObj<=end);
    const onlineReqs=reqSpans.filter(({onlineDate})=>onlineDate&&onlineDate.getTime()===dateObj.getTime());
    html+=`<div class="cal-day${isOther?' other':''}${isToday?' today':''}">
      <div class="cal-day-n${isToday?' today-n':''}">
        <span>${dayNum}</span>
        ${isToday?`<span class="today-badge">今</span>`:''}
      </div>
      ${onlineReqs.map(({r})=>`<div class="cal-bar" style="background:#16a34a" onclick="openSidePanel('${r.id}')" title="上线：${r.title}"><span class="cal-online-badge"></span>${r.title}</div>`).join('')}
      ${activeReqs.filter(({r})=>!onlineReqs.find(o=>o.r.id===r.id)).slice(0,3).map(({r})=>`<div class="cal-bar" style="background:${CAL_COLORS[r.status]||'#94a3b8'}" onclick="openSidePanel('${r.id}')" title="${r.title}">${r.title}</div>`).join('')}
      ${activeReqs.length>3?`<div style="font-size:10px;color:#9ca3af;padding:1px 3px">+${activeReqs.length-3}个</div>`:''}
    </div>`;
  }
  grid.innerHTML=html;
}

// ============ RENDER HELPERS ============
function renderMarkdown(md){
  if(!md)return'';
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hul]|<li|<hr)(.+)$/gm,'<p>$1</p>');
}

    <tbody>${tasks.map(t=>`<tr>
      <td style="min-width:120px;font-weight:500">${t.title}</td>
      <td>${taskTypeTag(t.type)}</td>
      <td>${userName(t.assignee_id)}</td>

  return comments.map(cm=>{

    return`<div class="comment-item">
      <div class="comment-av">${u.name.slice(0,1)}</div>

          <span class="comment-author">${u.name}</span>

function highlightMentions(text){
  return(text||'').replace(/@([^\s@，。！？,!?\n]+)/g,'<span class="mention-hl">@$1</span>');
}

function handleMentionInput(ta,popupId){
  const popup=document.getElementById(popupId);if(!popup)return;
  const val=ta.value,cur=ta.selectionStart;
  const before=val.slice(0,cur);
  const atIdx=before.lastIndexOf('@');
  if(atIdx===-1||(atIdx>0&&/\S/.test(before[atIdx-1]))){popup.classList.remove('open');return;}
  const query=before.slice(atIdx+1).toLowerCase();
  const matches=allUsers.filter(u=>u.id!==CU.id&&(u.name.toLowerCase().includes(query)||u.username.toLowerCase().includes(query))).slice(0,6);
  if(!matches.length){popup.classList.remove('open');return;}
  popup.innerHTML=matches.map(u=>`<div class="mention-opt" onclick="insertMention(document.getElementById('${ta.id}'),'${u.name}','${popupId}')"><div class="mention-av">${u.name.slice(0,1)}</div>${u.name}<span style="color:#9ca3af;font-size:11px;margin-left:4px">@${u.username}</span></div>`).join('');
  popup.classList.add('open');
}
function insertMention(ta,name,popupId){
  const cur=ta.selectionStart,val=ta.value,before=val.slice(0,cur);
  const atIdx=before.lastIndexOf('@');
  ta.value=val.slice(0,atIdx)+`@${name} `+val.slice(cur);
  ta.focus();const np=atIdx+name.length+2;ta.setSelectionRange(np,np);
  document.getElementById(popupId)?.classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.mention-popup')&&!e.target.closest('textarea'))
    document.querySelectorAll('.mention-popup.open').forEach(p=>p.classList.remove('open'));
});

// ============ ATTACHMENTS ============
function attachIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext))return'🖼';
  if(ext==='pdf')return'📄';
  if(['doc','docx'].includes(ext))return'📝';
  if(['xls','xlsx'].includes(ext))return'📊';
  if(['zip','rar'].includes(ext))return'📦';
  if(['fig','sketch'].includes(ext))return'🎨';
  return'📎';
}
async function loadSpAttachments(reqId){
  const{data:files}=await sb.storage.from('prd-attachments').list(reqId+'/');
  const wrap=document.getElementById(`sp-attach-${reqId}`);
  if(!wrap||!files?.length)return;
  const items=files.filter(f=>f.name&&!f.name.startsWith('.')).map(f=>{
    const{data:{publicUrl}}=sb.storage.from('prd-attachments').getPublicUrl(`${reqId}/${f.name}`);
    return{name:f.name,url:publicUrl};
  });
  if(!items.length)return;
  wrap.innerHTML=`<div class="attach-grid">${items.map(f=>`
    <div class="attach-chip" onclick="previewAttach('${f.url}','${f.name}')">
      <span>${attachIcon(f.name)}</span>
      <span class="attach-chip-name">${f.name}</span>
      <span class="attach-del" onclick="event.stopPropagation();deleteAttach('${reqId}','${f.name}',false)">×</span>
    </div>`).join('')}</div>`;
}
function openAttachPanel(reqId){
  showModal('📎 PRD 附件管理',`
    <div id="attach-modal-${reqId}" style="margin-bottom:14px">加载中...</div>
    <div class="attach-drop" onclick="document.getElementById('af-inp-${reqId}').click()">
      📁 点击上传文件（图片 / PDF / 设计稿，单文件 ≤ 20MB）
      <input type="file" id="af-inp-${reqId}" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.fig,.sketch,.zip" onchange="uploadAttachFile('${reqId}',this)"/>
    </div>
    <div class="modal-err" id="attach-err"></div>`,
    [{label:'关闭',type:'default',onclick:'closeModal()'}]);
  loadAttachModalList(reqId);
}
async function loadAttachModalList(reqId){
  const{data:files}=await sb.storage.from('prd-attachments').list(reqId+'/');
  const el=document.getElementById(`attach-modal-${reqId}`);if(!el)return;
  const valid=files?.filter(f=>f.name&&!f.name.startsWith('.'))||[];
  if(!valid.length){el.innerHTML='<div style="color:#9ca3af;font-size:13px;padding:8px 0">暂无附件</div>';return;}
  const items=valid.map(f=>{
    const{data:{publicUrl}}=sb.storage.from('prd-attachments').getPublicUrl(`${reqId}/${f.name}`);
    return{name:f.name,url:publicUrl};
  });
  el.innerHTML=`<div class="attach-grid">${items.map(f=>`

      <span class="attach-del" onclick="event.stopPropagation();deleteAttach('${reqId}','${f.name}',true)">×</span>
    </div>`).join('')}</div>`;

async function uploadAttachFile(reqId,input){
  const file=input.files[0];if(!file)return;
  if(file.size>20*1024*1024){document.getElementById('attach-err').textContent='文件不能超过20MB';return;}
  const errEl=document.getElementById('attach-err');errEl.textContent='上传中...';
  const safeName=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._\u4e00-\u9fa5]/g,'_');
  const{error}=await sb.storage.from('prd-attachments').upload(`${reqId}/${safeName}`,file);
  if(error){errEl.textContent='上传失败：'+error.message;return;}
  errEl.textContent='';input.value='';
  loadAttachModalList(reqId);
  if(currentSpReqId===reqId)loadSpAttachments(reqId);
  showToast('附件上传成功','success');
}
async function deleteAttach(reqId,name,inModal){
  if(!confirm('确认删除附件？'))return;
  await sb.storage.from('prd-attachments').remove([`${reqId}/${name}`]);
  if(inModal)loadAttachModalList(reqId);
  if(currentSpReqId===reqId)loadSpAttachments(reqId);
  showToast('已删除');
}
function previewAttach(url,name){
  const ext=(name||'').split('.').pop().toLowerCase();
  const isImg=['jpg','jpeg','png','gif','webp','svg'].includes(ext);
  const isPdf=ext==='pdf';
  showModal(`${attachIcon(name)} ${name}`,`
    <div style="text-align:center">
      ${isImg?`<img src="${url}" style="max-width:100%;max-height:65vh;border-radius:10px;display:block;margin:0 auto"/>`:
        isPdf?`<iframe src="${url}" width="100%" height="500px" style="border:none;border-radius:8px"></iframe>`:
        `<div style="padding:40px;color:#9ca3af;font-size:14px">该文件类型不支持预览</div>`}
      <div style="margin-top:14px"><a href="${url}" download="${name}" target="_blank" class="ant-btn ant-btn-default ant-btn-sm">⬇ 下载文件</a></div>
    </div>`,
    [{label:'关闭',type:'default',onclick:'closeModal()'}]);
}

function insertPrdText(prefix){

function insertPrdWrap(before,after){

  const err=document.getElementById('prd-err');
  const btn=document.querySelector('#modal-footer .ant-btn-primary');
  if(btn){btn.disabled=true;btn.textContent='保存中...';}
  try{
    let error;
    if(prdId){({error}=await sb.from('prds').update({content,author_id:CU.id,updated_at:new Date().toISOString()}).eq('id',prdId));}
    else{({error}=await sb.from('prds').insert({requirement_id:reqId,content,author_id:CU.id,version:1}));}
    if(error){err.textContent='保存失败：'+error.message;return;}
    closeModal();showToast('PRD 已保存','success');renderSidePanel(reqId);
  }finally{if(btn){btn.disabled=false;btn.textContent='保存 PRD';}}
}

// ============ TASKS ============
function openAddTask(reqId){
  showModal('＋ 添加研发任务',`
    <div class="ant-form-item"><label class="ant-form-label">任务名称 *</label><input class="ant-input" id="task-title" placeholder="如：用户登录接口开发"/></div>
    <div class="ant-form-row">
      <div class="ant-form-item"><label class="ant-form-label">任务类型</label>
        <select class="ant-select" id="task-type">${Object.entries(TASK_TYPE_MAP).map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select></div>
      <div class="ant-form-item"><label class="ant-form-label">负责人</label>
        <select class="ant-select" id="task-assignee"><option value="">请选择</option>${allUsers.map(u=>`<option value="${u.id}" ${u.id===CU.id?'selected':''}>${u.name}</option>`).join('')}</select></div>
    </div>
    <div class="ant-form-row">
      <div class="ant-form-item"><label class="ant-form-label">预估人天</label><input class="ant-input" type="number" id="task-est" min="0" step="0.5" value="1"/></div>
      <div class="ant-form-item"><label class="ant-form-label">计划开始日期</label><input class="ant-input" type="date" id="task-start"/></div>
    </div>
    <div class="modal-err" id="task-err"></div>`,
    [{label:'取消',type:'default',onclick:'closeModal()'},{label:'添加任务',type:'primary',onclick:`saveTask('${reqId}')`}]);
}
async function saveTask(reqId){
  const title=document.getElementById('task-title')?.value.trim();
  const err=document.getElementById('task-err');
  if(!title){err.textContent='请填写任务名称';return;}
  const btn=document.querySelector('#modal-footer .ant-btn-primary');
  if(btn){btn.disabled=true;}
  const{data,error}=await sb.from('tasks').insert({
    requirement_id:reqId,title,
    type:document.getElementById('task-type').value,
    assignee_id:document.getElementById('task-assignee').value||null,
    estimated_days:Number(document.getElementById('task-est').value)||0,
    start_date:document.getElementById('task-start').value||null,
    status:'todo'
  }).select().single();
  if(error){err.textContent='添加失败：'+error.message;if(btn)btn.disabled=false;return;}
  allTasks.push(data);
  closeModal();showToast('任务已添加','success');
  const sec=document.getElementById(`sp-tasks-${reqId}`);
  if(sec)sec.innerHTML=renderTasksTable(allTasks.filter(t=>t.requirement_id===reqId),reqId);
  const tlSel=document.getElementById(`sp-tl-task-${reqId}`);
  if(tlSel)tlSel.innerHTML='<option value="">选择任务（可选）</option>'+allTasks.filter(t=>t.requirement_id===reqId).map(t=>`<option value="${t.id}">${t.title}</option>`).join('');
}
async function updateTask(taskId,field,value,reqId){
  const{data,error}=await sb.from('tasks').update({[field]:value,updated_at:new Date().toISOString()}).eq('id',taskId).select().single();
  if(error){showToast('更新失败','error');return;}
  const idx=allTasks.findIndex(x=>x.id===taskId);
  if(idx>=0)allTasks[idx]=data;
}
async function deleteTask(taskId,reqId){
  if(!confirm('确认删除该任务？'))return;
  await sb.from('tasks').delete().eq('id',taskId);
  allTasks=allTasks.filter(x=>x.id!==taskId);
  const sec=document.getElementById(`sp-tasks-${reqId}`);
  if(sec)sec.innerHTML=renderTasksTable(allTasks.filter(t=>t.requirement_id===reqId),reqId);
  showToast('任务已删除');
}

// ============ TIMELOG ============
async function deleteTimelog(id){
  if(!confirm('确认删除该工时记录？'))return;
  await sb.from('timelog').delete().eq('id',id);
  allTimelogs=allTimelogs.filter(x=>x.id!==id);
  showToast('已删除');
}

async function saveGoOnline(reqId){

// ============ MY TASKS ============
function renderMyTasks(){
  const sf=document.getElementById('mytask-filter').value;
  let tasks=allTasks.filter(t=>t.assignee_id===CU.id);
  if(sf)tasks=tasks.filter(t=>t.status===sf);
  const el=document.getElementById('my-tasks-list');
  if(!tasks.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">暂无分配给你的任务</div><div class="empty-desc">当有任务分配给你时，会显示在这里</div></div>`;return;}
  el.innerHTML=`<div class="ant-table-wrap"><table class="ant-table">
    <thead><tr><th>任务名称</th><th>类型</th><th>所属需求</th><th>状态</th><th>预估人天</th><th>实际人天</th><th>截止日期</th></tr></thead>
    <tbody>${tasks.map(t=>{
      const req=allRequirements.find(r=>r.id===t.requirement_id);
      return`<tr>
        <td style="font-weight:600">${t.title}</td>
        <td>${taskTypeTag(t.type)}</td>
        <td><span class="text-link" onclick="openSidePanel('${t.requirement_id}')">${req?req.title:'—'}</span></td>
        <td><span class="ant-tag ${t.status==='done'?'tag-online':t.status==='doing'?'tag-dev':'tag-draft'}">${TASK_STATUS_MAP[t.status]}</span></td>
        <td>${t.estimated_days||0}天</td>
        <td>${t.actual_days||0}天</td>
        <td>${t.end_date?fmtDate(t.end_date):'—'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ============ TIMELOG VIEW ============
function renderTimelog(){
  const uid=document.getElementById('tl-filter-user').value;
  const rid=document.getElementById('tl-filter-req').value;
  const month=document.getElementById('tl-filter-month').value;
  let list=[...allTimelogs];
  if(uid)list=list.filter(t=>t.user_id===uid);
  if(rid)list=list.filter(t=>t.requirement_id===rid);
  if(month)list=list.filter(t=>t.log_date&&t.log_date.slice(0,7)===month);
  list.sort((a,b)=>b.log_date.localeCompare(a.log_date));
  const totalH=list.reduce((s,t)=>s+Number(t.hours),0);
  const byUser={};list.forEach(t=>{byUser[t.user_id]=(byUser[t.user_id]||0)+Number(t.hours);});
  document.getElementById('timelog-stats').innerHTML=`
    <div class="tl-stats">
      <div class="tl-stat-card"><div class="tl-stat-num">${totalH.toFixed(1)}</div><div class="tl-stat-label">筛选工时(h)</div></div>
      ${Object.entries(byUser).map(([uid,h])=>`<div class="tl-stat-card"><div class="tl-stat-num" style="font-size:20px">${h.toFixed(1)}h</div><div class="tl-stat-label">${userName(uid)}</div></div>`).join('')}
    </div>`;
  const wrap=document.getElementById('timelog-list-wrap');
  if(!list.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-title">暂无工时记录</div></div>`;return;}
  wrap.innerHTML=`<div class="ant-table-wrap"><table class="ant-table">
    <thead><tr><th>成员</th><th>日期</th><th>需求</th><th>任务</th><th>工时</th><th>备注</th></tr></thead>
    <tbody>${list.map(t=>{
      const req=allRequirements.find(r=>r.id===t.requirement_id);
      const task=allTasks.find(x=>x.id===t.task_id);
      return`<tr>
        <td style="font-weight:600">${userName(t.user_id)}</td>
        <td>${t.log_date}</td>
        <td style="max-width:200px"><span class="text-link" onclick="openSidePanel('${t.requirement_id}')">${req?req.title:'—'}</span></td>
        <td style="max-width:150px;color:#6b7280">${task?task.title:'—'}</td>
        <td><span style="font-weight:800;color:#1677ff;font-size:15px">${t.hours}h</span></td>
        <td style="color:#9ca3af">${t.note||'—'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ============ USERS ============
async function renderUsers(){
  const{data:users}=await sb.from('users').select('*').order('name');
  if(users)allUsers=users;
  const tbl=document.getElementById('users-table');
  tbl.innerHTML=`<thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>操作</th></tr></thead>
  <tbody>${(allUsers||[]).map(u=>`<tr>
    <td style="font-family:monospace;color:#6b7280">${u.username}</td>
    <td style="font-weight:600">${u.name}</td>
    <td><span class="role-badge ${u.role==='admin'?'role-admin':u.role==='pm'?'role-pm':u.role==='dev'?'role-dev':'role-member'}">${u.role==='admin'?'管理员':u.role==='pm'?'产品经理':u.role==='dev'?'开发':u.role}</span></td>
    <td><div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="ant-btn ant-btn-default ant-btn-sm" onclick="openEditUser('${u.id}','${u.name}','${u.role}')">编辑</button>
      ${u.id!==CU.id?`<button class="ant-btn ant-btn-danger ant-btn-sm" onclick="deleteUser('${u.id}','${u.name}')">删除</button>`:''}
    </div></td>
  </tr>`).join('')}</tbody>`;
}
function openAddUser(){
  showModal('＋ 添加成员',`
    <div class="ant-form-item"><label class="ant-form-label">用户名</label><input class="ant-input" id="m-uname" placeholder="3-12位字母数字下划线"/></div>
    <div class="ant-form-item"><label class="ant-form-label">姓名</label><input class="ant-input" id="m-name" placeholder="显示名"/></div>
    <div class="ant-form-item"><label class="ant-form-label">初始密码</label><input class="ant-input" type="password" id="m-pass" placeholder="至少6位"/></div>
    <div class="ant-form-item"><label class="ant-form-label">角色</label>
      <select class="ant-select" id="m-role"><option value="member">成员</option><option value="dev">开发</option><option value="pm">产品经理</option><option value="admin">管理员</option></select></div>
    <div class="modal-err" id="m-err"></div>`,
    [{label:'取消',type:'default',onclick:'closeModal()'},{label:'添加成员',type:'primary',onclick:'saveNewUser()'}]);
}
async function saveNewUser(){
  const u=document.getElementById('m-uname')?.value.trim(),name=document.getElementById('m-name')?.value.trim(),p=document.getElementById('m-pass')?.value,role=document.getElementById('m-role')?.value;
  const err=document.getElementById('m-err');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  const btn=document.querySelector('#modal-footer .ant-btn-primary');
  if(btn){btn.disabled=true;btn.textContent='添加中...';}
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@agile-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='创建失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role});
    closeModal();renderUsers();showToast('成员添加成功','success');
  }catch(e){err.textContent='操作失败，请重试';}
  finally{if(btn){btn.disabled=false;btn.textContent='添加成员';}}
}
function openEditUser(id,name,role){
  showModal('✏️ 编辑成员',`
    <div class="ant-form-item"><label class="ant-form-label">姓名</label><input class="ant-input" id="m-name" value="${name}"/></div>
    <div class="ant-form-item"><label class="ant-form-label">角色</label>
      <select class="ant-select" id="m-role">
        <option value="member" ${role==='member'?'selected':''}>成员</option>
        <option value="dev" ${role==='dev'?'selected':''}>开发</option>
        <option value="pm" ${role==='pm'?'selected':''}>产品经理</option>
        <option value="admin" ${role==='admin'?'selected':''}>管理员</option>
      </select></div>
    <div class="modal-err" id="m-err"></div>`,
    [{label:'取消',type:'default',onclick:'closeModal()'},{label:'保存',type:'primary',onclick:`saveEditUser('${id}')`}]);
}
async function saveEditUser(id){
  const name=document.getElementById('m-name')?.value.trim();
  if(!name){document.getElementById('m-err').textContent='姓名不能为空';return;}
  await sb.from('users').update({name,role:document.getElementById('m-role').value}).eq('id',id);
  const idx=allUsers.findIndex(x=>x.id===id);
  if(idx>=0){allUsers[idx].name=name;allUsers[idx].role=document.getElementById('m-role').value;}
  closeModal();renderUsers();showToast('修改成功','success');
}
async function deleteUser(id,name){
  if(!confirm(`确认删除成员「${name}」？`))return;
  await sb.from('users').delete().eq('id',id);
  allUsers=allUsers.filter(u=>u.id!==id);
  renderUsers();showToast('已删除');
}

// ============ EXCEL EXPORT ============
function loadXLSX(cb){
  if(window.XLSX){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
  s.onload=cb;document.head.appendChild(s);
}
function exportRequirementsExcel(){loadXLSX(()=>{
  const rows=[['需求标题','类型','优先级','状态','负责人','目标日期','上线日期','版本号','预估人天','实际工时(h)','创建时间']];
  allRequirements.forEach(r=>{
    const totalH=allTimelogs.filter(t=>t.requirement_id===r.id).reduce((s,t)=>s+Number(t.hours),0);
    const estDays=allTasks.filter(t=>t.requirement_id===r.id).reduce((s,t)=>s+Number(t.estimated_days||0),0);
    rows.push([r.title,TYPE_MAP[r.type]||r.type,PRIORITY_MAP[r.priority]||r.priority,STATUS_MAP[r.status]||r.status,userName(r.owner_id),r.target_date||'',r.online_date||'',r.online_version||'',estDays,totalH.toFixed(1),fmtDate(r.created_at)]);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:30},{wch:10},{wch:8},{wch:10},{wch:10},{wch:12},{wch:12},{wch:10},{wch:10},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'需求列表');
  XLSX.writeFile(wb,`需求列表_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
  showToast('需求列表已导出','success');
});}
function exportTimelogExcel(){loadXLSX(()=>{
  const rows=[['日期','成员','需求','任务','工时(h)','备注']];
  [...allTimelogs].sort((a,b)=>a.log_date.localeCompare(b.log_date)).forEach(t=>{
    const req=allRequirements.find(r=>r.id===t.requirement_id);
    const task=allTasks.find(x=>x.id===t.task_id);
    rows.push([t.log_date,userName(t.user_id),req?req.title:'',task?task.title:'',t.hours,t.note||'']);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:10},{wch:30},{wch:20},{wch:8},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'工时报表');
  XLSX.writeFile(wb,`工时报表_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
  showToast('工时报表已导出','success');
});}

// ============ MODAL SYSTEM ============
function showModal(title,bodyHtml,actions){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  document.getElementById('modal-footer').innerHTML=(actions||[]).map(a=>
    `<button class="ant-btn ant-btn-${a.type||'default'}" onclick="${a.onclick}">${a.label}</button>`
  ).join('');
  document.getElementById('modal-box').style.maxWidth='540px';
  document.getElementById('modal').classList.add('open');
}
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

// ============ TOAST SYSTEM ============
function showToast(msg,type='info'){
  const container=document.getElementById('toast-container');
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast-item toast-${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(20px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300);},2500);
}
</script>
