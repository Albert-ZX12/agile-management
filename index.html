<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--surface3:#eef0f3;
  --border:#e4e6ea;--border2:#d0d3d9;
  --text:#1a1d23;--text2:#52576b;--text3:#9198a8;
  --accent:#1e3a5f;--accent2:#2563eb;--accent-light:#eff4ff;--accent-text:#1e3a5f;
  --green:#16a34a;--green-light:#f0fdf4;
  --orange:#ea580c;--orange-light:#fff7ed;
  --red:#dc2626;--red-light:#fef2f2;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --yellow:#ca8a04;--yellow-light:#fefce8;
  --cyan:#0891b2;--cyan-light:#ecfeff;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* ---- LOADING ---- */
#ls{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
#ls.hide{opacity:0;pointer-events:none}
.ll{font-size:30px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:8px}
.ls{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:28px}
.lb{width:180px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.lb-i{height:100%;background:#fff;border-radius:2px;animation:lb 1.2s ease-in-out infinite}
@keyframes lb{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* ---- AUTH ---- */
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f,#2563eb 60%,#3b82f6)}
#auth.show{display:flex}
.auth-box{background:#fff;border-radius:16px;padding:40px 36px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.auth-logo{font-size:24px;font-weight:800;color:var(--accent);margin-bottom:4px;letter-spacing:-.5px}
.auth-sub{color:var(--text3);font-size:13px;margin-bottom:24px}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.auth-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;background:var(--surface2);color:var(--text2);border:none;transition:all .15s}
.auth-tab.active{background:var(--accent);color:#fff;font-weight:600}
.f-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;margin-top:12px}
.f-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;background:var(--surface2);transition:border-color .15s;font-family:inherit}
.f-input:focus{border-color:var(--accent2);background:#fff}
.f-err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
.btn-block{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;transition:background .15s}
.btn-block:hover{background:var(--accent2)}
.btn-block:disabled{opacity:.6;cursor:not-allowed}

/* ---- APP SHELL ---- */
#app{display:none;min-height:100vh}
#app.show{display:block}
.topbar{position:sticky;top:0;z-index:100;background:var(--accent);display:flex;align-items:center;padding:0 20px;height:54px;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-logo{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;flex:1}
.topbar-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:13px;transition:background .15s}
.topbar-user:hover{background:rgba(255,255,255,.2)}
.u-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:rgba(255,255,255,.25);color:#fff;flex-shrink:0}

/* ---- NAV ---- */
.nav-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.nav-item{flex-shrink:0;padding:12px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;position:relative}
.nav-item:hover{color:var(--text2)}
.nav-item.active{color:var(--accent2);border-bottom-color:var(--accent2);font-weight:600}
.nav-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle}

/* ---- MAIN ---- */
.main{max-width:1100px;margin:0 auto;padding:20px 16px 40px}

/* ---- VIEWS ---- */
.view{display:none}.view.active{display:block}

/* ---- PAGE HEADER ---- */
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;color:var(--text)}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ---- BUTTONS ---- */
.btn{padding:7px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text2)}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:6px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;font-size:14px}
.btn-icon:hover{border-color:var(--accent2);color:var(--accent2)}

/* ---- FILTERS / SEARCH ---- */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.f-select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);outline:none;color:var(--text);cursor:pointer}
.f-select:focus{border-color:var(--accent2)}
.f-search{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);outline:none;color:var(--text);width:200px}
.f-search:focus{border-color:var(--accent2)}

/* ---- CARDS ---- */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px 18px;margin-bottom:10px;transition:box-shadow .15s,border-color .15s;cursor:pointer}
.card:hover{border-color:var(--accent2);box-shadow:var(--shadow-md)}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-title{font-size:14px;font-weight:600;color:var(--text);flex:1;line-height:1.4}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--text3)}
.card-meta-item{display:flex;align-items:center;gap:3px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}

/* ---- STATUS / PRIORITY BADGES ---- */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-dot{width:6px;height:6px;border-radius:50%}
/* Status */
.s-draft{background:#f1f5f9;color:#64748b}
.s-prd{background:var(--purple-light);color:var(--purple)}
.s-dev{background:var(--accent-light);color:var(--accent2)}
.s-test{background:var(--cyan-light);color:var(--cyan)}
.s-online{background:var(--green-light);color:var(--green)}
.s-archived{background:var(--surface3);color:var(--text3)}
.s-blocked{background:var(--red-light);color:var(--red)}
/* Priority */
.p-urgent{background:var(--red-light);color:var(--red)}
.p-high{background:var(--orange-light);color:var(--orange)}
.p-medium{background:var(--yellow-light);color:var(--yellow)}
.p-low{background:var(--surface3);color:var(--text3)}
/* Type */
.t-feature{background:var(--accent-light);color:var(--accent2)}
.t-bug{background:var(--red-light);color:var(--red)}
.t-improve{background:var(--purple-light);color:var(--purple)}
.t-tech{background:var(--cyan-light);color:var(--cyan)}
/* Task type */
.tt-dev{background:var(--accent-light);color:var(--accent2)}
.tt-test{background:var(--cyan-light);color:var(--cyan)}
.tt-design{background:var(--purple-light);color:var(--purple)}
.tt-other{background:var(--surface3);color:var(--text3)}

/* ---- DETAIL PANEL ---- */
.detail-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
@media(max-width:800px){.detail-layout{grid-template-columns:1fr}}
.detail-main{}
.detail-side{}
.detail-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:14px}
.detail-section-title{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.detail-section-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent2);border-radius:2px;margin-right:8px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{display:flex;flex-direction:column;gap:3px}
.info-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.info-value{font-size:13px;color:var(--text);font-weight:500}

/* ---- PRD EDITOR ---- */
.prd-toolbar{display:flex;gap:4px;padding:8px;background:var(--surface2);border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:1px solid var(--border);border-bottom:none;flex-wrap:wrap}
.prd-tool-btn{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s}
.prd-tool-btn:hover{border-color:var(--accent2);color:var(--accent2);background:var(--accent-light)}
.prd-editor{width:100%;min-height:300px;padding:14px;border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);font-size:13px;font-family:inherit;resize:vertical;outline:none;background:var(--surface);color:var(--text);line-height:1.8;transition:border-color .15s}
.prd-editor:focus{border-color:var(--accent2)}
.prd-preview{min-height:200px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;line-height:1.8;color:var(--text);background:var(--surface2)}
.prd-preview h1,.prd-preview h2,.prd-preview h3{margin:12px 0 6px;font-weight:700;color:var(--accent)}
.prd-preview h1{font-size:18px}.prd-preview h2{font-size:16px}.prd-preview h3{font-size:14px}
.prd-preview p{margin-bottom:8px}
.prd-preview ul,.prd-preview ol{padding-left:20px;margin-bottom:8px}
.prd-preview li{margin-bottom:3px}
.prd-preview strong{font-weight:700}
.prd-preview em{font-style:italic}
.prd-preview code{background:var(--surface3);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px}
.prd-preview hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.prd-version-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--text3)}

/* ---- TASKS TABLE ---- */
.tasks-table{width:100%;border-collapse:collapse}
.tasks-table th{padding:8px 12px;font-size:11px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.tasks-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.tasks-table tr:last-child td{border-bottom:none}
.tasks-table tr:hover td{background:var(--surface2)}
.tasks-table input[type=number]{width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;outline:none;text-align:center}
.tasks-table input[type=number]:focus{border-color:var(--accent2)}
.tasks-table select{padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;outline:none;background:var(--surface);color:var(--text)}
.tasks-table select:focus{border-color:var(--accent2)}

/* ---- TIMELOG ---- */
.timelog-form{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:14px}
.timelog-form-item{display:flex;flex-direction:column;gap:4px}
.timelog-form-item label{font-size:11px;color:var(--text3);font-weight:500}
.timelog-form-item input,.timelog-form-item select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:var(--surface);color:var(--text)}
.timelog-form-item input:focus,.timelog-form-item select:focus{border-color:var(--accent2)}
.timelog-list{display:flex;flex-direction:column;gap:6px}
.timelog-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px}
.timelog-item-user{font-weight:600;color:var(--text);width:70px;flex-shrink:0}
.timelog-item-date{color:var(--text3);width:80px;flex-shrink:0}
.timelog-item-task{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timelog-item-hours{font-weight:700;color:var(--accent2);width:50px;text-align:right;flex-shrink:0}
.timelog-item-del{color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px}
.timelog-item-del:hover{color:var(--red)}

/* ---- PROGRESS ---- */
.progress-bar-wrap{width:100%;background:var(--surface3);border-radius:4px;height:8px;overflow:hidden;margin:4px 0}
.progress-bar-fill{height:100%;border-radius:4px;background:var(--accent2);transition:width .3s}
.progress-update-form{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
.progress-update-list{display:flex;flex-direction:column;gap:8px}
.progress-update-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.pu-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pu-author{font-size:12px;font-weight:600;color:var(--text)}
.pu-time{font-size:11px;color:var(--text3)}
.pu-percent{margin-left:auto;font-size:12px;font-weight:700;color:var(--accent2)}
.pu-content{font-size:13px;color:var(--text2);line-height:1.5}

/* ---- DASHBOARD ---- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--text3);font-weight:500}
.stat-blue{color:var(--accent2)}
.stat-green{color:var(--green)}
.stat-orange{color:var(--orange)}
.stat-purple{color:var(--purple)}
.stat-red{color:var(--red)}

/* ---- STATUS FLOW ---- */
.status-flow{display:flex;align-items:center;gap:0;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.sf-step{display:flex;align-items:center;flex-shrink:0}
.sf-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .2s;flex-shrink:0}
.sf-dot:hover{border-color:var(--accent2);color:var(--accent2)}
.sf-dot.active{background:var(--accent2);border-color:var(--accent2);color:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.sf-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.sf-label{font-size:11px;color:var(--text3);margin-top:4px;text-align:center;white-space:nowrap}
.sf-step-wrap{display:flex;flex-direction:column;align-items:center;gap:0}
.sf-arrow{width:28px;height:2px;background:var(--border);flex-shrink:0}
.sf-arrow.done{background:var(--green)}

/* ---- BACK BTN ---- */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:16px;padding:6px 0;border:none;background:transparent;font-weight:500}
.back-btn:hover{color:var(--accent2)}

/* ---- USER MGMT ---- */
.users-table{width:100%;border-collapse:collapse}
.users-table th{padding:10px 14px;font-size:11px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
.users-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.users-table tr:last-child td{border-bottom:none}
.users-table tr:hover td{background:var(--surface2)}

/* ---- MODAL ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal-lg{max-width:720px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;margin-top:14px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;font-family:inherit;color:var(--text);background:var(--surface)}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent2)}
.modal textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:300;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}

/* ---- EMPTY ---- */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}

/* ---- MISC ---- */
.divider{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--text3);font-size:12px}
.tag-chip{display:inline-block;padding:2px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--text2)}
.inline-edit{background:transparent;border:none;border-bottom:1px dashed var(--border2);font-size:inherit;color:inherit;outline:none;padding:0 2px;font-family:inherit;cursor:text}
.inline-edit:focus{border-bottom-color:var(--accent2)}
.days-stat{display:flex;gap:4px;align-items:center;font-size:12px}
.days-est{color:var(--text3)}
.days-act{font-weight:600;color:var(--accent2)}
.overrun{color:var(--red)!important}
.role-badge{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:500}
.role-admin{background:#e8f5ee;color:#1b4332}
.role-pm{background:var(--accent-light);color:var(--accent2)}
.role-dev{background:var(--purple-light);color:var(--purple)}
.role-member{background:var(--surface3);color:var(--text3)}

@media(max-width:600px){
  .main{padding:14px 10px 40px}
  .form-row{grid-template-columns:1fr}
  .page-hd{flex-direction:column;align-items:stretch}
  .page-actions{justify-content:flex-end}
  .detail-layout{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .filter-bar{gap:6px}
  .f-search{width:100%}
  .modal{padding:20px 16px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="ls"><div class="ll">⚡ 敏捷管理</div><div class="ls">加载中...</div><div class="lb"><div class="lb-i"></div></div></div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">⚡ 敏捷需求管理</div>
    <div class="auth-sub">软件开发全流程管理平台</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" onclick="switchTab('register')">注册</button>
    </div>
    <div id="login-form">
      <label class="f-label">用户名</label>
      <input class="f-input" id="l-user" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')doLogin()"/>
      <label class="f-label">密码</label>
      <input class="f-input" id="l-pass" type="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()"/>
      <div class="f-err" id="l-err"></div>
      <button class="btn-block" id="l-btn" onclick="doLogin()">登 录</button>
    </div>
    <div id="register-form" style="display:none">
      <label class="f-label">用户名</label><input class="f-input" id="r-user" placeholder="3-12位字母数字下划线"/>
      <label class="f-label">姓名</label><input class="f-input" id="r-name" placeholder="如：张三"/>
      <label class="f-label">密码</label><input class="f-input" id="r-pass" type="password" placeholder="至少6位"/>
      <div class="f-err" id="r-err"></div>
      <button class="btn-block" id="r-btn" onclick="doRegister()">注 册</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚡ 敏捷需求管理</div>
    <div class="topbar-user" onclick="doLogout()">
      <div class="u-avatar" id="top-avatar">U</div>
      <span id="top-name">用户</span>
      <span style="opacity:.6;font-size:11px">退出</span>
    </div>
  </div>
  <div class="nav-bar" id="main-nav">
    <div class="nav-item active" data-view="dashboard" onclick="showView('dashboard')">📊 总览</div>
    <div class="nav-item" data-view="requirements" onclick="showView('requirements')">📋 需求列表</div>
    <div class="nav-item" data-view="my-tasks" onclick="showView('my-tasks')">✅ 我的任务</div>
    <div class="nav-item" data-view="timelog" onclick="showView('timelog')">⏱ 工时统计</div>
    <div class="nav-item" data-view="users" onclick="showView('users')" id="nav-users" style="display:none">👥 成员管理</div>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="page-hd">
        <div class="page-title">项目总览</div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openCreateReq()">＋ 新建需求</button>
        </div>
      </div>
      <div class="stat-grid" id="dash-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" id="dash-grids">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">📌 进行中需求</div>
          <div id="dash-inprogress"></div>
        </div>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">🔔 最新动态</div>
          <div id="dash-activity"></div>
        </div>
      </div>
    </div>

    <!-- REQUIREMENTS LIST -->
    <div class="view" id="view-requirements">
      <div class="page-hd">
        <div class="page-title">需求列表</div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openCreateReq()">＋ 新建需求</button>
        </div>
      </div>
      <div class="filter-bar">
        <select class="f-select" id="req-filter-status" onchange="renderRequirements()">
          <option value="">全部状态</option>
          <option value="draft">草稿</option>
          <option value="prd">PRD编写</option>
          <option value="dev">开发中</option>
          <option value="test">测试中</option>
          <option value="online">已上线</option>
          <option value="archived">已归档</option>
          <option value="blocked">受阻</option>
        </select>
        <select class="f-select" id="req-filter-priority" onchange="renderRequirements()">
          <option value="">全部优先级</option>
          <option value="urgent">紧急</option>
          <option value="high">高</option>
          <option value="medium">中</option>
          <option value="low">低</option>
        </select>
        <select class="f-select" id="req-filter-type" onchange="renderRequirements()">
          <option value="">全部类型</option>
          <option value="feature">新功能</option>
          <option value="bug">Bug修复</option>
          <option value="improve">优化改进</option>
          <option value="tech">技术需求</option>
        </select>
        <input class="f-search" id="req-search" placeholder="🔍 搜索需求..." oninput="renderRequirements()"/>
      </div>
      <div id="req-list"></div>
    </div>

    <!-- REQUIREMENT DETAIL -->
    <div class="view" id="view-req-detail">
      <button class="back-btn" onclick="showView('requirements')">← 返回需求列表</button>
      <div id="req-detail-content"></div>
    </div>

    <!-- MY TASKS -->
    <div class="view" id="view-my-tasks">
      <div class="page-hd"><div class="page-title">我的任务</div></div>
      <div class="filter-bar">
        <select class="f-select" id="mytask-filter" onchange="renderMyTasks()">
          <option value="">全部状态</option>
          <option value="todo">待开始</option>
          <option value="doing">进行中</option>
          <option value="done">已完成</option>
        </select>
      </div>
      <div id="my-tasks-list"></div>
    </div>

    <!-- TIMELOG -->
    <div class="view" id="view-timelog">
      <div class="page-hd"><div class="page-title">工时统计</div></div>
      <div class="filter-bar">
        <select class="f-select" id="tl-filter-user" onchange="renderTimelog()">
          <option value="">全部成员</option>
        </select>
        <select class="f-select" id="tl-filter-req" onchange="renderTimelog()">
          <option value="">全部需求</option>
        </select>
        <input type="month" class="f-select" id="tl-filter-month" onchange="renderTimelog()"/>
      </div>
      <div id="timelog-stats" style="margin-bottom:16px"></div>
      <div id="timelog-list-wrap"></div>
    </div>

    <!-- USERS -->
    <div class="view" id="view-users">
      <div class="page-hd">
        <div class="page-title">成员管理</div>
        <button class="btn btn-primary" onclick="openAddUser()">＋ 添加成员</button>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <table class="users-table" id="users-table"></table>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"><div class="modal" id="modal-body"></div></div>
<div class="toast" id="toast"></div>

<script>
// ============ INIT ============
let sb;
try{ sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }catch(e){}

let CU = null; // currentUser
let allUsers = [];
let allRequirements = [];
let allTasks = [];
let allTimelogs = [];

const STATUS_MAP = {draft:'草稿',prd:'PRD编写',dev:'开发中',test:'测试中',online:'已上线',archived:'已归档',blocked:'受阻'};
const STATUS_CLASS = {draft:'s-draft',prd:'s-prd',dev:'s-dev',test:'s-test',online:'s-online',archived:'s-archived',blocked:'s-blocked'};
const STATUS_FLOW = ['draft','prd','dev','test','online'];
const PRIORITY_MAP = {urgent:'紧急',high:'高',medium:'中',low:'低'};
const PRIORITY_CLASS = {urgent:'p-urgent',high:'p-high',medium:'p-medium',low:'p-low'};
const TYPE_MAP = {feature:'新功能',bug:'Bug修复',improve:'优化改进',tech:'技术需求'};
const TYPE_CLASS = {feature:'t-feature',bug:'t-bug',improve:'t-improve',tech:'t-tech'};
const TASK_TYPE_MAP = {dev:'开发',test:'测试',design:'设计',other:'其他'};
const TASK_TYPE_CLASS = {dev:'tt-dev',test:'tt-test',design:'tt-design',other:'tt-other'};
const TASK_STATUS_MAP = {todo:'待开始',doing:'进行中',done:'已完成'};

window.addEventListener('DOMContentLoaded', async () => {
  if(!sb) return;
  const {data:{session}} = await sb.auth.getSession();
  if(session){ await loadProfile(session.user.id); }else{ hideLoading(); }
});

async function loadProfile(authId){
  const {data} = await sb.from('users').select('*').eq('auth_id',authId).single();
  if(data){ CU=data; await enterApp(); }else{ hideLoading(); }
}

function hideLoading(){
  const el=document.getElementById('ls');
  el.classList.add('hide');
  setTimeout(()=>el.style.display='none',400);
  document.getElementById('auth').classList.add('show');
}

// ============ AUTH ============
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
}

async function doLogin(){
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('l-btn');
  if(!u||!p){err.textContent='请填写用户名和密码';return;}
  err.textContent='';btn.disabled=true;btn.textContent='登录中...';
  try{
    const{data:ur}=await sb.from('users').select('email').eq('username',u).single();
    if(!ur){err.textContent='用户名或密码错误';return;}
    const{data,error}=await sb.auth.signInWithPassword({email:ur.email,password:p});
    if(error){err.textContent='用户名或密码错误';return;}
    await loadProfile(data.user.id);
  }catch(e){err.textContent='登录失败，请重试';}
  finally{btn.disabled=false;btn.textContent='登 录';}
}

async function doRegister(){
  const u=document.getElementById('r-user').value.trim(),name=document.getElementById('r-name').value.trim(),p=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err'),btn=document.getElementById('r-btn');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  err.textContent='';btn.disabled=true;btn.textContent='注册中...';
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@agile-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='注册失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role:'member'});
    showToast('注册成功，请登录');switchTab('login');
    document.getElementById('l-user').value=u;
  }catch(e){err.textContent='注册出错，请重试';}
  finally{btn.disabled=false;btn.textContent='注 册';}
}

async function doLogout(){
  await sb.auth.signOut();CU=null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('app').style.display='none';
  document.getElementById('auth').classList.add('show');
}

async function enterApp(){
  document.getElementById('ls').style.display='none';
  document.getElementById('auth').classList.remove('show');
  const app=document.getElementById('app');app.style.display='block';app.classList.add('show');
  document.getElementById('top-name').textContent=CU.name;
  document.getElementById('top-avatar').textContent=CU.name.slice(0,1);
  if(CU.role==='admin'||CU.role==='pm') document.getElementById('nav-users').style.display='';
  // Set default month filter
  document.getElementById('tl-filter-month').value=new Date().toISOString().slice(0,7);
  await refreshAll();
  showView('dashboard');
}

async function refreshAll(){
  const[{data:users},{data:reqs},{data:tasks},{data:tlogs}] = await Promise.all([
    sb.from('users').select('*').order('name'),
    sb.from('requirements').select('*').order('created_at',{ascending:false}),
    sb.from('tasks').select('*').order('created_at'),
    sb.from('timelog').select('*').order('log_date',{ascending:false})
  ]);
  allUsers=users||[];allRequirements=reqs||[];allTasks=tasks||[];allTimelogs=tlogs||[];
  // Populate user/req filter dropdowns
  const uSel=document.getElementById('tl-filter-user');
  uSel.innerHTML='<option value="">全部成员</option>'+allUsers.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  const rSel=document.getElementById('tl-filter-req');
  rSel.innerHTML='<option value="">全部需求</option>'+allRequirements.map(r=>`<option value="${r.id}">${r.title}</option>`).join('');
}

// ============ NAVIGATION ============
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const nav=document.querySelector(`.nav-item[data-view="${name}"]`);
  if(nav) nav.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(name==='dashboard') renderDashboard();
  if(name==='requirements') renderRequirements();
  if(name==='my-tasks') renderMyTasks();
  if(name==='timelog') renderTimelog();
  if(name==='users') renderUsers();
}

// ============ HELPERS ============
function userName(id){ const u=allUsers.find(x=>x.id===id); return u?u.name:'—'; }
function userAvatar(id){ const u=allUsers.find(x=>x.id===id); return u?u.name.slice(0,1):'?'; }
function fmtDate(d){ if(!d)return'—'; return new Date(d).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'}); }
function fmtDateTime(d){ if(!d)return'—'; return new Date(d).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function statusBadge(s){ return `<span class="badge ${STATUS_CLASS[s]||'s-draft'}">${STATUS_MAP[s]||s}</span>`; }
function priorityBadge(p){ return `<span class="badge ${PRIORITY_CLASS[p]||'p-medium'}">${PRIORITY_MAP[p]||p}</span>`; }
function typeBadge(t){ return `<span class="badge ${TYPE_CLASS[t]||'t-feature'}">${TYPE_MAP[t]||t}</span>`; }
function taskTypeBadge(t){ return `<span class="badge ${TASK_TYPE_CLASS[t]||'tt-dev'}">${TASK_TYPE_MAP[t]||t}</span>`; }

// ============ DASHBOARD ============
async function renderDashboard(){
  const stats=document.getElementById('dash-stats');
  const total=allRequirements.length;
  const indev=allRequirements.filter(r=>['dev','test'].includes(r.status)).length;
  const online=allRequirements.filter(r=>r.status==='online').length;
  const blocked=allRequirements.filter(r=>r.status==='blocked').length;
  const totalHours=allTimelogs.reduce((s,t)=>s+Number(t.hours),0);
  stats.innerHTML=`
    <div class="stat-card"><div class="stat-num stat-blue">${total}</div><div class="stat-label">全部需求</div></div>
    <div class="stat-card"><div class="stat-num stat-orange">${indev}</div><div class="stat-label">研发中</div></div>
    <div class="stat-card"><div class="stat-num stat-green">${online}</div><div class="stat-label">已上线</div></div>
    <div class="stat-card"><div class="stat-num stat-red">${blocked}</div><div class="stat-label">受阻</div></div>
    <div class="stat-card"><div class="stat-num stat-purple">${totalHours.toFixed(1)}</div><div class="stat-label">总工时(h)</div></div>`;

  // In-progress
  const ip=allRequirements.filter(r=>['dev','test','prd'].includes(r.status)).slice(0,6);
  const ipEl=document.getElementById('dash-inprogress');
  if(!ip.length){ipEl.innerHTML=`<div class="empty"><div class="empty-icon">✨</div><div>暂无进行中需求</div></div>`;return;}
  ipEl.innerHTML=ip.map(r=>{
    const latestProgress=allTasks.filter(t=>t.requirement_id===r.id);
    const done=latestProgress.filter(t=>t.status==='done').length;
    const total=latestProgress.length;
    const pct=total?Math.round(done/total*100):0;
    return`<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="openReqDetail('${r.id}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        ${statusBadge(r.status)}${priorityBadge(r.priority)}
        <span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text3)">
        <span>负责人：${userName(r.owner_id)}</span><span>${pct}%</span>
      </div>
    </div>`;
  }).join('');

  // Activity
  const actEl=document.getElementById('dash-activity');
  const recent=[...allRequirements].sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at)).slice(0,8);
  actEl.innerHTML=recent.map(r=>`
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openReqDetail('${r.id}')">
      <div style="flex:1">
        <div style="font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDateTime(r.updated_at)}</div>
      </div>
      ${statusBadge(r.status)}
    </div>`).join('');
}

// ============ REQUIREMENTS LIST ============
function renderRequirements(){
  const status=document.getElementById('req-filter-status').value;
  const priority=document.getElementById('req-filter-priority').value;
  const type=document.getElementById('req-filter-type').value;
  const search=document.getElementById('req-search').value.trim().toLowerCase();
  let list=[...allRequirements];
  if(status) list=list.filter(r=>r.status===status);
  if(priority) list=list.filter(r=>r.priority===priority);
  if(type) list=list.filter(r=>r.type===type);
  if(search) list=list.filter(r=>r.title.toLowerCase().includes(search)||(r.description||'').toLowerCase().includes(search));
  const el=document.getElementById('req-list');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">暂无需求</div><div>点击「新建需求」开始添加</div></div>`;return;}
  el.innerHTML=list.map(r=>{
    const tasks=allTasks.filter(t=>t.requirement_id===r.id);
    const done=tasks.filter(t=>t.status==='done').length;
    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    const totalH=allTimelogs.filter(t=>t.requirement_id===r.id).reduce((s,t)=>s+Number(t.hours),0);
    return`<div class="card" onclick="openReqDetail('${r.id}')">
      <div class="card-header">
        <div>
          <div class="card-title">${r.title}</div>
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
            ${statusBadge(r.status)}${priorityBadge(r.priority)}${typeBadge(r.type)}
          </div>
        </div>
      </div>
      <div class="card-meta">
        <span class="card-meta-item">👤 ${userName(r.owner_id)}</span>
        <span class="card-meta-item">📅 ${fmtDate(r.target_date)}</span>
        <span class="card-meta-item">⏱ ${totalH.toFixed(1)}h</span>
        ${tasks.length?`<span class="card-meta-item">✅ ${done}/${tasks.length} 任务</span>`:''}
      </div>
      ${tasks.length?`<div style="margin-top:8px"><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div style="text-align:right;font-size:11px;color:var(--text3);margin-top:2px">${pct}%</div></div>`:''}
    </div>`;
  }).join('');
}

// ============ REQUIREMENT DETAIL ============
async function openReqDetail(id){
  showView('req-detail');
  document.getElementById('req-detail-content').innerHTML='<div style="padding:20px;color:var(--text3)">加载中...</div>';
  const r=allRequirements.find(x=>x.id===id);
  if(!r) return;
  const tasks=allTasks.filter(t=>t.requirement_id===id);
  const timelogs=allTimelogs.filter(t=>t.requirement_id===id);
  const totalH=timelogs.reduce((s,t)=>s+Number(t.hours),0);
  const estDays=tasks.reduce((s,t)=>s+Number(t.estimated_days||0),0);
  const actDays=tasks.reduce((s,t)=>s+Number(t.actual_days||0),0);

  // Fetch PRD and progress updates
  const [{data:prd},{data:progList}] = await Promise.all([
    sb.from('prds').select('*').eq('requirement_id',id).order('version',{ascending:false}).limit(1).single(),
    sb.from('progress_updates').select('*').eq('requirement_id',id).order('created_at',{ascending:false}).limit(20)
  ]);

  const flowIdx=STATUS_FLOW.indexOf(r.status);
  const flowHtml=STATUS_FLOW.map((s,i)=>`
    <div class="sf-step-wrap">
      <div class="sf-step">
        ${i>0?`<div class="sf-arrow ${i<=flowIdx?'done':''}"></div>`:''}
        <div class="sf-dot ${i<flowIdx?'done':i===flowIdx?'active':''}" onclick="updateReqStatus('${id}','${s}')" title="点击切换到此状态">${i+1}</div>
      </div>
      <div class="sf-label">${STATUS_MAP[s]}</div>
    </div>`).join('');

  const canEdit = CU.role==='admin'||CU.role==='pm'||r.creator_id===CU.id;

function renderTimelogSummary(list){
  if(!list.length) return`<div style="font-size:13px;color:var(--text3)">暂无工时记录</div>`;
  const byUser={};
  list.forEach(t=>{ byUser[t.user_id]=(byUser[t.user_id]||0)+Number(t.hours); });
  return Object.entries(byUser).map(([uid,h])=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">

      <span style="font-weight:700;color:var(--accent2)">${h.toFixed(1)}h</span>
    </div>`).join('');
}

// ============ MARKDOWN RENDERER ============
function renderMarkdown(md){
  if(!md) return'';
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hul]|<li|<hr)(.+)$/gm,'<p>$1</p>');
}

async function loadPrdContent(reqId, prdId){
  const {data}=await sb.from('prds').select('content').eq('id',prdId).single();
  if(data) document.getElementById('prd-content-input').value=data.content||'';
}

function insertPrdText(prefix){
  const ta=document.getElementById('prd-content-input');
  const start=ta.selectionStart, end=ta.selectionEnd;
  ta.value=ta.value.slice(0,start)+prefix+ta.value.slice(end);
  ta.focus(); ta.setSelectionRange(start+prefix.length,start+prefix.length);
}
function insertPrdWrap(before,after){
  const ta=document.getElementById('prd-content-input');
  const start=ta.selectionStart,end=ta.selectionEnd;
  const sel=ta.value.slice(start,end)||'文字';
  ta.value=ta.value.slice(0,start)+before+sel+after+ta.value.slice(end);
  ta.focus(); ta.setSelectionRange(start+before.length,start+before.length+sel.length);
}

async function savePrd(reqId, prdId){
  const content=document.getElementById('prd-content-input').value;
  const err=document.getElementById('prd-err');
  const btn=document.getElementById('prd-confirm');
  btn.disabled=true;btn.textContent='保存中...';
  try{
    let data,error;
    if(prdId){
      const res=await sb.from('prds').update({content,author_id:CU.id,updated_at:new Date().toISOString()}).eq('id',prdId).select().single();
      data=res.data;error=res.error;
    }else{
      const res=await sb.from('prds').insert({requirement_id:reqId,content,author_id:CU.id,version:1}).select().single();
      data=res.data;error=res.error;
    }
    if(error){err.textContent='保存失败：'+error.message;return;}
    closeModal();showToast('PRD 已保存','success');
    openReqDetail(reqId);
  }finally{btn.disabled=false;btn.textContent='保存 PRD';}
}

          ${allUsers.map(u=>`<option value="${u.id}" ${u.id===CU.id?'selected':''}>${u.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label class="f-label">预估人天</label>
        <input class="f-input" type="number" id="task-est" min="0" step="0.5" value="1"/>
      </div>
      <div>
        <label class="f-label">计划开始日期</label>
        <input class="f-input" type="date" id="task-start"/>
      </div>
    </div>
    <div class="modal-err" id="task-err"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="task-confirm" onclick="saveTask('${reqId}')">添加</button>
    </div>`;
  openModal();
}

async function saveTask(reqId){
  const title=document.getElementById('task-title').value.trim();
  const err=document.getElementById('task-err');
  if(!title){err.textContent='请填写任务名称';return;}
  const btn=document.getElementById('task-confirm');btn.disabled=true;
  const {data,error}=await sb.from('tasks').insert({
    requirement_id:reqId,title,
    type:document.getElementById('task-type').value,
    assignee_id:document.getElementById('task-assignee').value||null,
    estimated_days:Number(document.getElementById('task-est').value)||0,
    start_date:document.getElementById('task-start').value||null,
    status:'todo'
  }).select().single();
  if(error){err.textContent='添加失败：'+error.message;btn.disabled=false;return;}
  allTasks.push(data);
  closeModal();showToast('任务已添加','success');
  // Refresh tasks section
  const tasks=allTasks.filter(t=>t.requirement_id===reqId);
  const sec=document.getElementById(`tasks-section-${reqId}`);
  if(sec) sec.innerHTML=renderTasksTable(tasks,reqId);
  // Refresh timelog task selector
  const tlSel=document.getElementById(`tl-task-${reqId}`);
  if(tlSel) tlSel.innerHTML='<option value="">选择任务（可选）</option>'+allTasks.filter(t=>t.requirement_id===reqId).map(t=>`<option value="${t.id}">${t.title}</option>`).join('');
}

async function updateTask(taskId, field, value, reqId){
  const {data,error}=await sb.from('tasks').update({[field]:value,updated_at:new Date().toISOString()}).eq('id',taskId).select().single();
  if(error){showToast('更新失败',true);return;}
  const idx=allTasks.findIndex(x=>x.id===taskId);
  if(idx>=0) allTasks[idx]=data;
  showToast('已更新','success');
}

async function deleteTask(taskId, reqId){
  if(!confirm('确认删除该任务？')) return;
  await sb.from('tasks').delete().eq('id',taskId);
  allTasks=allTasks.filter(x=>x.id!==taskId);
  const tasks=allTasks.filter(t=>t.requirement_id===reqId);
  const sec=document.getElementById(`tasks-section-${reqId}`);
  if(sec) sec.innerHTML=renderTasksTable(tasks,reqId);
  showToast('任务已删除');
}

// ============ PROGRESS ============
async function submitProgress(reqId){
  const content=document.getElementById(`pu-content-${reqId}`).value.trim();
  const pct=Number(document.getElementById(`pu-pct-${reqId}`).value);
  if(!content){showToast('请填写进度描述',true);return;}
  const {data,error}=await sb.from('progress_updates').insert({
    requirement_id:reqId,author_id:CU.id,content,progress_percent:pct
  }).select().single();
  if(error){showToast('提交失败：'+error.message,true);return;}
  document.getElementById(`pu-content-${reqId}`).value='';
  document.getElementById(`pu-pct-${reqId}`).value=0;
  document.getElementById(`pu-pct-val-${reqId}`).textContent='0%';
  // Refresh progress list
  const {data:list}=await sb.from('progress_updates').select('*').eq('requirement_id',reqId).order('created_at',{ascending:false}).limit(20);
  const el=document.getElementById(`progress-list-${reqId}`);
  if(el) el.innerHTML=renderProgressList(list||[]);
  // Update req updated_at
  await sb.from('requirements').update({updated_at:new Date().toISOString()}).eq('id',reqId);
  const idx=allRequirements.findIndex(x=>x.id===reqId);
  if(idx>=0) allRequirements[idx].updated_at=new Date().toISOString();
  showToast('进度已更新','success');
}

// ============ TIMELOG ============
async function submitTimelog(reqId){
  const hours=Number(document.getElementById(`tl-hours-${reqId}`).value);
  const date=document.getElementById(`tl-date-${reqId}`).value;
  if(!hours||!date){showToast('请填写日期和工时',true);return;}
  const {data,error}=await sb.from('timelog').insert({
    requirement_id:reqId,
    task_id:document.getElementById(`tl-task-${reqId}`).value||null,
    user_id:CU.id,
    log_date:date,
    hours,
    note:document.getElementById(`tl-note-${reqId}`).value
  }).select().single();
  if(error){showToast('填报失败：'+error.message,true);return;}
  allTimelogs.unshift(data);
  document.getElementById(`tl-hours-${reqId}`).value=1;
  document.getElementById(`tl-note-${reqId}`).value='';
  // Refresh timelog section
  const timelogs=allTimelogs.filter(t=>t.requirement_id===reqId);
  const el=document.getElementById(`timelog-detail-${reqId}`);
  if(el) el.innerHTML=renderTimelogList(timelogs);
  // Update side summary
  showToast('工时填报成功','success');
}

async function deleteTimelog(id){
  if(!confirm('确认删除该工时记录？')) return;
  await sb.from('timelog').delete().eq('id',id);
  allTimelogs=allTimelogs.filter(x=>x.id!==id);
  showToast('已删除');
  // Reload current detail if visible
  const detail=document.getElementById('req-detail-content');
  if(detail&&detail.innerHTML!=='<div style="padding:20px;color:var(--text3)">加载中...</div>'){
    const reqId=allTimelogs[0]?.requirement_id; // approximate
  }
}

async function saveGoOnline(reqId){

}

// ============ MY TASKS ============
async function renderMyTasks(){
  const statusFilter=document.getElementById('mytask-filter').value;
  let tasks=allTasks.filter(t=>t.assignee_id===CU.id);
  if(statusFilter) tasks=tasks.filter(t=>t.status===statusFilter);
  const el=document.getElementById('my-tasks-list');
  if(!tasks.length){el.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">暂无分配给你的任务</div></div>`;return;}
  el.innerHTML=tasks.map(t=>{
    const req=allRequirements.find(r=>r.id===t.requirement_id);
    return`<div class="card" onclick="openReqDetail('${t.requirement_id}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        ${taskTypeBadge(t.type)}
        <span class="badge ${t.status==='done'?'s-online':t.status==='doing'?'s-dev':'s-draft'}">${TASK_STATUS_MAP[t.status]}</span>
        <span style="font-size:13px;font-weight:600">${t.title}</span>
      </div>
      <div class="card-meta">
        ${req?`<span>📋 ${req.title}</span>`:''}
        <span>预估：${t.estimated_days||0}天</span>
        <span>实际：${t.actual_days||0}天</span>
        ${t.end_date?`<span>截止：${fmtDate(t.end_date)}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ============ TIMELOG VIEW ============
async function renderTimelog(){
  const userId=document.getElementById('tl-filter-user').value;
  const reqId=document.getElementById('tl-filter-req').value;
  const month=document.getElementById('tl-filter-month').value;
  let list=[...allTimelogs];
  if(userId) list=list.filter(t=>t.user_id===userId);
  if(reqId) list=list.filter(t=>t.requirement_id===reqId);
  if(month) list=list.filter(t=>t.log_date&&t.log_date.slice(0,7)===month);
  list.sort((a,b)=>b.log_date.localeCompare(a.log_date));

  const totalH=list.reduce((s,t)=>s+Number(t.hours),0);
  const byUser={};list.forEach(t=>{byUser[t.user_id]=(byUser[t.user_id]||0)+Number(t.hours);});

  document.getElementById('timelog-stats').innerHTML=`
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
      <div class="stat-card"><div class="stat-num stat-blue">${totalH.toFixed(1)}</div><div class="stat-label">总工时(h)</div></div>
      ${Object.entries(byUser).map(([uid,h])=>`<div class="stat-card"><div class="stat-num stat-purple">${h.toFixed(1)}h</div><div class="stat-label">${userName(uid)}</div></div>`).join('')}
    </div>`;

  const wrap=document.getElementById('timelog-list-wrap');
  if(!list.length){wrap.innerHTML=`<div class="empty"><div class="empty-icon">⏱</div><div class="empty-title">暂无工时记录</div></div>`;return;}
  wrap.innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--surface2)">
          <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">成员</th>
          <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">日期</th>
          <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">需求</th>
          <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">任务</th>
          <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">工时</th>
          <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">备注</th>
        </tr></thead>
        <tbody>${list.map(t=>{
          const req=allRequirements.find(r=>r.id===t.requirement_id);
          const task=allTasks.find(x=>x.id===t.task_id);
          return`<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:10px 14px;font-size:13px">${userName(t.user_id)}</td>
            <td style="padding:10px 14px;font-size:13px">${t.log_date}</td>
            <td style="padding:10px 14px;font-size:13px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${req?req.title:'—'}</td>
            <td style="padding:10px 14px;font-size:13px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${task?task.title:'—'}</td>
            <td style="padding:10px 14px;font-size:13px;font-weight:700;color:var(--accent2)">${t.hours}h</td>
            <td style="padding:10px 14px;font-size:12px;color:var(--text3)">${t.note||'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

// ============ USERS ============

  if(users) allUsers=users;
  const tbl=document.getElementById('users-table');
  tbl.innerHTML=`<thead><tr>
    <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">用户名</th>
    <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">姓名</th>
    <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">角色</th>
    <th style="padding:10px 14px;font-size:11px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase">操作</th>

      <span class="role-badge ${u.role==='admin'?'role-admin':u.role==='pm'?'role-pm':u.role==='dev'?'role-dev':'role-member'}">${u.role==='admin'?'管理员':u.role==='pm'?'产品经理':u.role==='dev'?'开发':u.role}</span>
    </td>
    <td style="padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="openEditUser('${u.id}','${u.name}','${u.role}')">编辑</button>

}

function openAddUser(){
  document.getElementById('modal-body').innerHTML=`
    <h3>添加成员</h3>
    <label class="f-label">用户名</label><input class="f-input" id="m-uname" placeholder="3-12位字母数字下划线"/>
    <label class="f-label">姓名</label><input class="f-input" id="m-name" placeholder="显示名"/>
    <label class="f-label">初始密码</label><input class="f-input" type="password" id="m-pass" placeholder="至少6位"/>
    <label class="f-label">角色</label>
    <select class="f-input" id="m-role">
      <option value="member">成员</option><option value="dev">开发</option>
      <option value="pm">产品经理</option><option value="admin">管理员</option>
    </select>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="m-confirm" onclick="saveNewUser()">添加</button>
    </div>`;
  openModal();
}

async function saveNewUser(){
  const u=document.getElementById('m-uname').value.trim(),name=document.getElementById('m-name').value.trim(),p=document.getElementById('m-pass').value,role=document.getElementById('m-role').value;
  const err=document.getElementById('m-err'),btn=document.getElementById('m-confirm');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  err.textContent='';btn.disabled=true;btn.textContent='添加中...';
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@agile-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='创建失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role});
    closeModal();renderUsers();showToast('成员添加成功','success');
  }catch(e){err.textContent='操作失败，请重试';}
  finally{btn.disabled=false;btn.textContent='添加';}
}

function openEditUser(id,name,role){
  document.getElementById('modal-body').innerHTML=`
    <h3>编辑成员</h3>
    <label class="f-label">姓名</label><input class="f-input" id="m-name" value="${name}"/>
    <label class="f-label">角色</label>
    <select class="f-input" id="m-role">
      <option value="member" ${role==='member'?'selected':''}>成员</option>
      <option value="dev" ${role==='dev'?'selected':''}>开发</option>
      <option value="pm" ${role==='pm'?'selected':''}>产品经理</option>
      <option value="admin" ${role==='admin'?'selected':''}>管理员</option>
    </select>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="m-confirm" onclick="saveEditUser('${id}')">保存</button>
    </div>`;
  openModal();
}

async function saveEditUser(id){
  const name=document.getElementById('m-name').value.trim();
  if(!name){document.getElementById('m-err').textContent='姓名不能为空';return;}
  document.getElementById('m-confirm').disabled=true;
  await sb.from('users').update({name,role:document.getElementById('m-role').value}).eq('id',id);
  const idx=allUsers.findIndex(x=>x.id===id);
  if(idx>=0){allUsers[idx].name=name;allUsers[idx].role=document.getElementById('m-role').value;}
  closeModal();renderUsers();showToast('修改成功','success');
}

async function deleteUser(id,name){
  if(!confirm(`确认删除成员「${name}」？`)) return;
  await sb.from('users').delete().eq('id',id);
  allUsers=allUsers.filter(u=>u.id!==id);
  renderUsers();showToast('已删除');
}

// ============ MODAL / TOAST ============
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(type==='success'?' success':type==='error'||type===true?' error':'');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
